name: GrapheneOS forum import

on:
  workflow_dispatch:
    inputs:
      hashes_url:
        description: URL to grapheneos-forum-hashes-*.txt (ignored when use_latest_release is true)
        type: string
        default: https://github.com/RoundSalmon4/AppVerifierBG/releases/download/nightly-2026-05-29/grapheneos-forum-hashes-2026-05-29.txt
      use_latest_release:
        description: Download the newest nightly grapheneos-forum-hashes-*.txt from RoundSalmon4/AppVerifierBG
        type: boolean
        default: false
      dry_run:
        description: List missing entries and issues that would be opened, without creating issues
        type: boolean
        default: false
      max_issues:
        description: Maximum issues to create (0 = no limit). Only counts eligible packages; skips already-open duplicates.
        type: number
        default: 0

concurrency:
  group: grapheneos-forum-import
  cancel-in-progress: false

jobs:
  resolveUrl:
    name: Resolve hashes export URL
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.hashes.outputs.url }}
    steps:
      - name: Resolve hashes export URL
        id: hashes
        env:
          GH_TOKEN: ${{ github.token }}
          HASHES_URL: ${{ inputs.hashes_url }}
          USE_LATEST: ${{ inputs.use_latest_release }}
        run: |
          set -euo pipefail

          if [[ "$USE_LATEST" == "true" ]]; then
            resolved=$(gh api 'repos/RoundSalmon4/AppVerifierBG/releases?per_page=100' \
              --jq '[.[] | select(.tag_name | startswith("nightly-"))] | sort_by(.created_at) | reverse | .[0] | {tag: .tag_name, asset: ([.assets[] | select(.name | startswith("grapheneos-forum-hashes-") and endswith(".txt"))] | .[0])} | select(.asset != null) | .asset.browser_download_url' \
              | head -n1)
            if [[ -z "$resolved" ]]; then
              echo "Could not find grapheneos-forum-hashes-*.txt in AppVerifierBG nightly releases." >&2
              exit 1
            fi
            echo "url=$resolved" >> "$GITHUB_OUTPUT"
          else
            echo "url=$HASHES_URL" >> "$GITHUB_OUTPUT"
          fi

  import:
    name: Compare export and open issues
    needs: resolveUrl
    uses: ./.github/workflows/import-missing-submissions.yml
    secrets: inherit
    with:
      source_url: ${{ needs.resolveUrl.outputs.url }}
      download_filename: grapheneos-forum-hashes.txt
      import_script: .github/scripts/grapheneos_forum_import.py
      compare_input_flag: --hashes-file
      create_issues_url_flag: --hashes-url
      summary_jq: '.[] | "\(.package): \(.fingerprints | length) fingerprint(s)"'
      summary_heading: Missing forum submissions not yet represented in data.yml
      label_name: Import GOS
      label_color: C5DEF5
      label_description: Opened automatically from the GrapheneOS forum hashes export
      artifact_prefix: grapheneos-forum-import
      dry_run: ${{ inputs.dry_run }}
      max_issues: ${{ inputs.max_issues }}
