name: Commit PR As-Is

on:
  pull_request:
    types:
      - labeled

concurrency:
  group: data-yml-writes
  cancel-in-progress: false
  queue: max

jobs:
  prepare:
    name: Finalize PR (prepare)
    runs-on: ubuntu-latest
    if: >-
      github.event.label.name == 'Commit As-Is' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'new/')

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      prepared: ${{ steps.meta.outputs.prepared }}
      skipped: ${{ steps.meta.outputs.skipped }}
      headRef: ${{ steps.meta.outputs.headRef }}
      issueNumber: ${{ steps.meta.outputs.issueNumber }}
      author: ${{ steps.coauthor.outputs.author }}

    steps:
      - name: Validate pull request
        id: prMeta
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event.pull_request.state }}" != "open" ]]; then
            echo "Pull request is not open." >&2
            exit 1
          fi

          issue="${HEAD_REF#new/}"
          if [[ "$issue" == "$HEAD_REF" || ! "$issue" =~ ^[0-9]+$ ]]; then
            echo "Expected head branch new/<issue>, got: ${HEAD_REF}" >&2
            exit 1
          fi
          echo "issueNumber=$issue" >> "$GITHUB_OUTPUT"

          files=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json files -q '.files[].path')
          unexpected=$(printf '%s\n' "$files" | grep -vxF 'data.yml' || true)
          if [[ -n "$unexpected" ]]; then
            echo "This workflow only supports pull requests that change data.yml." >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check merge-blocking labels
        uses: ./.github/actions/check-do-not-merge
        with:
          issueNumber: ${{ steps.prMeta.outputs.issueNumber }}
          pullRequestNumber: ${{ github.event.pull_request.number }}
          actionDescription: Commit As-Is
          codebergToken: ${{ secrets.CB_SYNC_TOKEN }}

      - name: Resolve co-authors
        id: coauthor
        uses: ./.github/actions/resolve-submission-coauthors
        with:
          labelerLogin: ${{ github.event.sender.login }}
          labelerId: ${{ github.event.sender.id }}
          submitterLogin: ${{ github.event.pull_request.user.login }}
          submitterId: ${{ github.event.pull_request.user.id }}
          issueNumber: ${{ steps.prMeta.outputs.issueNumber }}
          codebergToken: ${{ secrets.CB_SYNC_TOKEN }}

      - name: Prepare submission data.yml
        id: finalize
        uses: ./.github/actions/finalize-submission-pr
        with:
          pushToBranch: "false"
          pullRequestNumber: ${{ github.event.pull_request.number }}
          headRef: ${{ github.event.pull_request.head.ref }}
          headSha: ${{ github.event.pull_request.head.sha }}
          issueNumber: ${{ steps.prMeta.outputs.issueNumber }}
          commitSubject: ${{ github.event.pull_request.title }}
          coAuthorTrailer: ${{ steps.coauthor.outputs.trailer }}
          author: ${{ steps.coauthor.outputs.author }}
          sshSigningKey: ${{ secrets.ACTIONS_SSH_KEY }}

      - name: Export metadata
        id: meta
        if: always()
        run: |
          echo "prepared=${{ steps.finalize.outputs.prepared }}" >> "$GITHUB_OUTPUT"
          echo "skipped=${{ steps.finalize.outputs.skipped }}" >> "$GITHUB_OUTPUT"
          echo "headRef=${{ github.event.pull_request.head.ref }}" >> "$GITHUB_OUTPUT"
          echo "issueNumber=${{ steps.prMeta.outputs.issueNumber }}" >> "$GITHUB_OUTPUT"

      # The push job re-merges this PR's delta onto the latest main; data.yml is attested
      # *after* it is merged, so no whole-file snapshot is uploaded here.
      - name: Upload PR submission data (delta source)
        if: steps.meta.outputs.prepared == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-submission-data
          path: pr-submission-data.yml
          if-no-files-found: error

      - name: Upload commit message
        if: steps.meta.outputs.prepared == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: submission-commit-msg
          path: submission-commit-msg
          if-no-files-found: error

      - name: Comment when skipped
        if: steps.meta.outputs.skipped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
            --body "Could not commit PR as-is: \`data.yml\` on this branch already matches \`main\`."

  push:
    name: Finalize PR (push)
    runs-on: ubuntu-latest
    needs: prepare
    if: >-
      always() &&
      needs.prepare.outputs.prepared == 'true'

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      commitSha: ${{ steps.verified.outputs.commitSha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download PR submission data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-submission-data
          path: .

      - name: Download commit message
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: submission-commit-msg
          path: .

      # Rebuild the PR branch from the LATEST main and re-merge only the PR's delta (its added/
      # changed package entries) onto it — never a whole-file snapshot that would revert
      # concurrent entries. gh pr merge then 3-way merges this onto main; a true conflict
      # surfaces as a failed merge for manual rebase rather than silently reverting.
      - name: Build verified branch commit (delta onto latest main)
        id: verified
        env:
          SSH_KEY: ${{ secrets.ACTIONS_SSH_KEY }}
          AUTHOR: ${{ needs.prepare.outputs.author }}
          HEAD_REF: ${{ needs.prepare.outputs.headRef }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh

          git fetch origin main
          git checkout -B "$HEAD_REF" origin/main

          merged=$(submission_merge_data_delta pr-submission-data.yml data.yml)
          echo "Re-merged ${merged} package(s) from the PR onto the latest main."
          git add data.yml

          if git diff --cached --quiet; then
            echo "PR delta is already present on main; nothing to commit. Closing PR."
            echo "commitSha=" >> "$GITHUB_OUTPUT"
            gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
              --body "This submission is already present on \`main\`; closing without a new commit." || true
            gh pr close "$PR_NUMBER" --repo "$GH_REPO" || true
            exit 0
          fi

          key_file=$(submission_configure_git_signing "$SSH_KEY")
          trap 'rm -f "$key_file"' EXIT
          git commit -F submission-commit-msg --author="$AUTHOR"
          git push --force origin "HEAD:${HEAD_REF}"
          echo "commitSha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  merge:
    name: Merge attested PR
    runs-on: ubuntu-latest
    # Serialized via the workflow-level data-yml-writes concurrency group (top of file).
    needs: [prepare, push]
    if: >-
      always() &&
      needs.prepare.outputs.prepared == 'true' &&
      needs.push.outputs.commitSha != ''

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Merge pull request
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ needs.push.outputs.commitSha }}
        run: |
          set -euo pipefail
          # gh 3-way merges the branch's delta onto the current main: non-overlapping concurrent
          # entries merge cleanly; a true conflict fails here (manual rebase) instead of reverting.
          gh pr merge "$PR_NUMBER" --repo "$GH_REPO" --merge --admin
          # Capture main's merged data.yml so it can be attested (after the commit, not before).
          git fetch origin main
          git show origin/main:data.yml > data.yml
          gh pr comment "$PR_NUMBER" --repo "$GH_REPO" \
            --body "Merged with verified commit \`${COMMIT_SHA}\`; attestation follows."

      - name: Upload merged data.yml for attestation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: database
          path: data.yml
          if-no-files-found: error

      - name: Comment on linked issue
        uses: ./.github/actions/issue-comment
        with:
          issueNumber: ${{ needs.prepare.outputs.issueNumber }}
          body: "Merged submission PR GH-${{ github.event.pull_request.number }} to `main` with verified commit ${{ needs.push.outputs.commitSha }}."
          codebergToken: ${{ secrets.CB_SYNC_TOKEN }}

      - name: Remove Commit As-Is label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR_NUMBER" --repo "$GH_REPO" --remove-label "Commit As-Is" || true

  attest:
    name: Finalize PR (attest)
    needs: merge
    if: always() && needs.merge.result == 'success'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: database
      artifact-path: data.yml

  checkImportCodeberg:
    name: Check Import Codeberg label
    needs: [prepare, merge]
    if: needs.merge.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      importFromCodeberg: ${{ steps.check.outputs.import }}
    permissions:
      issues: read
    steps:
      - name: Detect Import Codeberg label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ needs.prepare.outputs.issueNumber }}
        run: |
          set -euo pipefail
          if gh issue view "$ISSUE" --repo "$GH_REPO" --json labels --jq '.labels[].name' | grep -qxF 'Import Codeberg'; then
            echo "import=true" >> "$GITHUB_OUTPUT"
          else
            echo "import=false" >> "$GITHUB_OUTPUT"
          fi

  syncMirrorsAfterMerge:
    name: Sync mirrors (commit as-is PR)
    needs: merge
    if: |
      always() &&
      !cancelled() &&
      needs.merge.result == 'success'
    uses: ./.github/workflows/sync-repo-to-mirrors.yml
    secrets: inherit

  syncCodebergAfterMerge:
    name: Sync Codeberg issue state (commit as-is PR)
    needs: [prepare, merge, checkImportCodeberg]
    if: |
      always() &&
      !cancelled() &&
      needs.merge.result == 'success' &&
      needs.checkImportCodeberg.outputs.importFromCodeberg == 'true'
    uses: ./.github/workflows/sync-codeberg-issue-state.yml
    secrets: inherit
    with:
      issueNumber: ${{ needs.prepare.outputs.issueNumber }}
      issueAction: closed
