name: Process Submission

on:
  issues:
    types: labeled

concurrency:
  group: ${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  parse:
    name: Parse Submission
    runs-on: ubuntu-latest
    outputs:
      packageName: ${{ steps.parsed.outputs.packageName }}
      packageSignature: ${{ steps.parsed.outputs.packageSignature }}
      apkUrl: ${{ steps.parsed.outputs.apkUrl }}
      isDuplicate: ${{ steps.duplicateCheck.outputs.isDuplicate }}
      duplicateOf: ${{ steps.duplicateCheck.outputs.duplicateOf }}

    if: ${{ github.event.label.name == 'Unchecked' || github.event.label.name == 'PR Anyways' }}

    permissions:
      contents: read
      issues: read

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Parse verification info
        id: parsed
        uses: ./.github/actions/parse-verification-info
        with:
          issueBody: ${{ github.event.issue.body }}

      - name: Print parsed submission
        run: |
          echo "Labels: ${{ toJSON(github.event.issue.labels) }}"
          echo "Package Name: ${{ steps.parsed.outputs.packageName }}"
          echo "Signature: ${{ steps.parsed.outputs.packageSignature }}"
          echo "Direct APK Link: ${{ steps.parsed.outputs.apkUrl }}"

      - name: Validate parsed submission
        uses: ./.github/actions/signature-lib
        with:
          operation: validate-submission
          packageName: ${{ steps.parsed.outputs.packageName }}
          packageSignature: ${{ steps.parsed.outputs.packageSignature }}

      - name: Check for duplicate submission
        id: duplicateCheck
        uses: ./.github/actions/check-duplicate-submission
        with:
          packageName: ${{ steps.parsed.outputs.packageName }}
          packageSignature: ${{ steps.parsed.outputs.packageSignature }}
          currentIssue: ${{ github.event.issue.number }}

  close-duplicate:
    name: Close Duplicate Submission
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate == 'true'

    permissions:
      issues: write

    steps:
      - name: Close issue as duplicate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          DUPLICATE_OF: ${{ needs.parse.outputs.duplicateOf }}
        run: |
          gh issue edit "$NUMBER" --repo "$GH_REPO" --remove-label "Unchecked" || true
          gh issue edit "$NUMBER" --repo "$GH_REPO" --remove-label "PR Anyways" || true

          if [[ "$DUPLICATE_OF" == "$NUMBER" ]]; then
            gh issue close "$NUMBER" --repo "$GH_REPO" \
              --comment "This package and signature are already tracked in an open submission or in data.yml."
          else
            gh issue close "$NUMBER" --repo "$GH_REPO" --duplicate-of "$DUPLICATE_OF"
          fi

  accrescent:
    name: Accrescent
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Unchecked'
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Get App Info From API
        id: appInfo
        uses: ./.github/actions/get-accrescent-app
        with:
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Print App Info
        id: accrescentInfo
        env:
          DOWNLOAD_INFO: ${{ steps.appInfo.outputs.downloadInfo }}
        run: |
          printf '%s\n' "$DOWNLOAD_INFO" | jq .
          firstUrl=$(printf '%s\n' "$DOWNLOAD_INFO" | jq -r '.split_download_info[0].url')
          firstApk=$(basename $firstUrl)
          echo "First URL: $firstUrl"
          echo "APK Basename: $firstApk"
          echo "apkUrl=$firstUrl" >> "$GITHUB_OUTPUT"
          echo "apkName=$firstApk" >> "$GITHUB_OUTPUT"

      - name: Restore APK Cache
        id: apkCache
        uses: actions/cache@v5
        with:
          path: ${{ steps.accrescentInfo.outputs.apkName }}
          key: accrescent-${{ env.PACKAGE_NAME }}-${{ steps.accrescentInfo.outputs.apkName }}

      - name: Download APKs
        if: steps.apkCache.outputs.cache-hit != 'true'
        id: appDownload
        env:
          DOWNLOAD_INFO: ${{ steps.accrescentInfo.outputs.apkUrl }}
        run: |
          wget "$DOWNLOAD_INFO"

      - name: Get (First) APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.accrescentInfo.outputs.apkName }}

      - name: Write Summary
        id: summary
        env: 
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY
      
      - name: Matches User-Provided?
        id: matches
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

  fdroid:
    name: F-Droid
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Unchecked'
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Download fdroidcl
        id: fdroidcl
        env:
          FDROIDCL_VERSION: v0.8.1
        run: |
          FDROIDCL="fdroidcl_${FDROIDCL_VERSION}_linux_amd64"
          export FDROIDCL
          wget "https://github.com/Hoverth/fdroidcl/releases/download/${FDROIDCL_VERSION}/${FDROIDCL}"
          chmod +x $FDROIDCL
          echo "bin=$FDROIDCL" >> "$GITHUB_OUTPUT"

      - name: Restore Repository Cache
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.cache/fdroidcl/cache-gob
          key: fdroidRepo

      - name: Restore APK Cache
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.cache/fdroidcl/apks
          key: fdroid-${{ env.PACKAGE_NAME }}

      - name: Update Repository
        run: |
          ./${{ steps.fdroidcl.outputs.bin }} update

      - name: Download APK
        id: appDownload
        run: |
          ./${{ steps.fdroidcl.outputs.bin }} download $PACKAGE_NAME
          apkPath=$(./${{ steps.fdroidcl.outputs.bin }} download $PACKAGE_NAME 2>&1 | grep '^APK available in ' | sed 's/^APK available in //')
          echo "$apkPath"
          echo "apkPath=$apkPath" >> "$GITHUB_OUTPUT"

      - name: Get APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.appDownload.outputs.apkPath }}

      - name: Write Summary
        id: summary
        env: 
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Matches User-Provided?
        id: matches
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

  gplay:
    name: Google Play
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Unchecked'
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Download cloudscraper
        run: pip install cloudscraper gpapi

      - name: Download gplay
        uses: actions/checkout@v6
        with:
          repository: alltechdev/gplay-apk-downloader
          persist-credentials: "false"
          path: gplay-apk-downloader

      - name: Restore Play Credentials Cache
        id: authCache
        uses: actions/cache@v5
        with:
          path: /home/runner/.gplay-auth.json
          key: gplayAuth

      - name: Authenticate to Google Play
        run: ./gplay-apk-downloader/gplay auth

      - name: Show App Info
        run: ./gplay-apk-downloader/gplay info "$PACKAGE_NAME"

      - name: Get App Version
        id: appVersion
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          echo "version=$(./gplay-apk-downloader/gplay check-version net.ivpn.client 2>&1 | grep '^Version Code:' | sed 's/^Version Code: //')" >> $GITHUB_OUTPUT
        
      - name: Restore APK Cache
        id: apkCache
        uses: actions/cache@v5
        with:
          path: gplay-${{ env.PACKAGE_NAME }}.apk
          key: gplay-${{ env.PACKAGE_NAME }}-${{ steps.appVersion.outputs.version }}

      - name: Download APK
        if: steps.apkCache.outputs.cache-hit != 'true'
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          ./gplay-apk-downloader/gplay download "$PACKAGE_NAME"

      - name: Rename APK
        if: steps.apkCache.outputs.cache-hit != 'true'
        run: |
          download="$(ls -1 *.apk | head -1)"
          mv "$download" "gplay-${PACKAGE_NAME}.apk"
          ls -la

      - name: Get (First) APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: gplay-${{ env.PACKAGE_NAME }}.apk

      - name: Matches User-Provided?
        id: matches
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

      - name: Write Summary
        id: summary
        env: 
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

  direct-apk:
    name: Direct APK Link
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Unchecked' && needs.parse.outputs.apkUrl != ''
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}
      APK_URL: ${{ needs.parse.outputs.apkUrl }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: APK cache key
        id: apkCacheKey
        run: |
          url_hash=$(printf '%s' "$APK_URL" | sha256sum | awk '{print $1}')
          echo "cacheKey=direct-apk-${url_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore APK Cache
        id: apkCache
        uses: actions/cache@v5
        with:
          path: direct-apk.apk
          key: ${{ steps.apkCacheKey.outputs.cacheKey }}

      - name: Download APK
        if: steps.apkCache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 -o direct-apk.apk "$APK_URL"
          file direct-apk.apk
          if ! file direct-apk.apk | grep -qiE 'zip archive|android'; then
            echo "Downloaded file does not look like an APK" >&2
            exit 1
          fi

      - name: Get APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: direct-apk.apk

      - name: Write Summary
        id: summary
        env:
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Matches User-Provided?
        id: matches
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

  appverifier-db:
    name: AppVerifier
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Unchecked'
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      found: ${{ steps.lookup.outputs.found }}
      signature: ${{ steps.lookup.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.combinedNote.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Lookup internal database fingerprints
        id: lookup
        uses: ./.github/actions/lookup-appverifier-database
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}

      - name: Matches User-Provided?
        id: matches
        if: steps.lookup.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.lookup.outputs.signature }}

      - name: Combine informational notes
        if: steps.lookup.outputs.found == 'true'
        id: combinedNote
        env:
          LOOKUP_NOTE: ${{ steps.lookup.outputs.infoNote }}
          MATCH_NOTE: ${{ steps.matches.outputs.infoNote }}
        run: |
          note=""
          if [[ -n "$LOOKUP_NOTE" ]]; then
            note="$LOOKUP_NOTE"
          fi
          if [[ -n "$MATCH_NOTE" ]]; then
            if [[ -n "$note" ]]; then
              note+=$'\n\n'
            fi
            note+="$MATCH_NOTE"
          fi
          if [[ -n "$note" ]]; then
            {
              echo 'infoNote<<EOF'
              printf '%s' "$note"
              echo
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "infoNote=" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Summary
        id: summary
        if: steps.lookup.outputs.found == 'true'
        env:
          SIGNATURE: ${{ steps.lookup.outputs.signature }}
          SOURCES: ${{ steps.lookup.outputs.sources }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "Sources in AppVerifier database: $SOURCES" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [parse, accrescent, fdroid, gplay, appverifier-db, direct-apk]

    if: always() && needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Unchecked'
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:

      - name: Validate
        run: |
          if [[ "${{ needs.parse.outputs.packageName }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "" ]]; then
            exit 1
          fi
          if [[ ${{ github.event.label.name }} != "Unchecked" ]]; then
            exit 1
          fi

      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Create Table
        env:
          USER_PKG: ${{ needs.parse.outputs.packageName }}
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          ACC_MATCH: ${{ needs.accrescent.outputs.match }}
          ACC_PKG: ${{ needs.accrescent.outputs.packageName }}
          ACC_SIG: ${{ needs.accrescent.outputs.signature }}
          FDROID_MATCH: ${{ needs.fdroid.outputs.match }}
          FDROID_PKG: ${{ needs.fdroid.outputs.packageName }}
          FDROID_SIG: ${{ needs.fdroid.outputs.signature }}
          GPLAY_MATCH: ${{ needs.gplay.outputs.match }}
          GPLAY_PKG: ${{ needs.gplay.outputs.packageName }}
          GPLAY_SIG: ${{ needs.gplay.outputs.signature }}
          AV_FOUND: ${{ needs.appverifier-db.outputs.found }}
          AV_MATCH: ${{ needs.appverifier-db.outputs.match }}
          AV_PKG: ${{ needs.appverifier-db.outputs.packageName }}
          AV_SIG: ${{ needs.appverifier-db.outputs.signature }}
          DIRECT_MATCH: ${{ needs.direct-apk.outputs.match }}
          DIRECT_PKG: ${{ needs.direct-apk.outputs.packageName }}
          DIRECT_SIG: ${{ needs.direct-apk.outputs.signature }}
          APK_URL: ${{ needs.parse.outputs.apkUrl }}
        run: |
          set -euo pipefail
          format_sig_cell() {
            local pkg="$1"
            local sig="$2"
            local sig_html="${sig//$'\n'/<br>}"
            printf '%s<br>%s' "$pkg" "$sig_html"
          }
          if [[ -n "$APK_URL" && "$AV_FOUND" == "true" ]]; then
            echo "We attempted to check Accrescent, F-Droid, Google Play, AppVerifier's internal database, and your direct APK link for this app. If we found any results, they'll be in the table below:" >> $GITHUB_STEP_SUMMARY
          elif [[ -n "$APK_URL" ]]; then
            echo "We attempted to check Accrescent, F-Droid, Google Play, and your direct APK link for this app. If we found any results, they'll be in the table below:" >> $GITHUB_STEP_SUMMARY
          elif [[ "$AV_FOUND" == "true" ]]; then
            echo "We attempted to check Accrescent, F-Droid, Google Play, and AppVerifier's internal database for this app. If we found any results, they'll be in the table below:" >> $GITHUB_STEP_SUMMARY
          else
            echo "We attempted to check Accrescent, F-Droid, and Google Play for this app. If we found any results, they'll be in the table below:" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Matches | Verification |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|"  >> $GITHUB_STEP_SUMMARY
          echo "| User-Provided | :arrow_down: | $(format_sig_cell "$USER_PKG" "$USER_SIG") |" >> $GITHUB_STEP_SUMMARY
          echo "| Accrescent | $ACC_MATCH | $(format_sig_cell "$ACC_PKG" "$ACC_SIG") |" >> $GITHUB_STEP_SUMMARY
          echo "| F-Droid | $FDROID_MATCH | $(format_sig_cell "$FDROID_PKG" "$FDROID_SIG") |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Play | $GPLAY_MATCH | $(format_sig_cell "$GPLAY_PKG" "$GPLAY_SIG") |" >> $GITHUB_STEP_SUMMARY
          if [[ "$AV_FOUND" == "true" ]]; then
            echo "| AppVerifier | $AV_MATCH | $(format_sig_cell "$AV_PKG" "$AV_SIG") |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "$APK_URL" ]]; then
            echo "| Direct APK Link | $DIRECT_MATCH | $(format_sig_cell "$DIRECT_PKG" "$DIRECT_SIG") |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":exclamation: We scanned the APK file at \`${APK_URL}\` which the submitter provided. This does not indicate its legitimacy, you must confirm this is a legitimate source." >> $GITHUB_STEP_SUMMARY
          fi
          cat "$GITHUB_STEP_SUMMARY" > ${RUNNER_TEMP}/issueBody.md

      - name: Find related packages in data.yml
        id: relatedPackages
        uses: ./.github/actions/signature-lib
        with:
          operation: find-related-packages
          packageName: ${{ needs.parse.outputs.packageName }}
          packageSignature: ${{ needs.parse.outputs.packageSignature }}

      - name: Append matching fingerprints from other packages
        if: steps.relatedPackages.outputs.relatedLines != ''
        env:
          RELATED_LINES: ${{ steps.relatedPackages.outputs.relatedLines }}
        run: |
          set -euo pipefail
          issue_body="${RUNNER_TEMP}/issueBody.md"
          {
            echo ""
            echo "This fingerprint matches another app already confirmed in our database! This may indicate it's from the same developer, you should check. If so, this is a stronger indication that this submission is legitimate:"
            echo ""
            echo "$RELATED_LINES"
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$issue_body"

      - name: Append informational notes
        env:
          ACC_INFO: ${{ needs.accrescent.outputs.infoNote }}
          FDROID_INFO: ${{ needs.fdroid.outputs.infoNote }}
          GPLAY_INFO: ${{ needs.gplay.outputs.infoNote }}
          AV_INFO: ${{ needs.appverifier-db.outputs.infoNote }}
          DIRECT_INFO: ${{ needs.direct-apk.outputs.infoNote }}
        run: |
          issue_body="${RUNNER_TEMP}/issueBody.md"
          printed_file="${RUNNER_TEMP}/printed-notes.txt"
          : > "$printed_file"
          append_note() {
            local note="$1"
            [[ -z "$note" ]] && return
            if grep -Fxq "$note" "$printed_file" 2>/dev/null; then
              return
            fi
            printf '%s\n' "$note" >> "$printed_file"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$note" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$issue_body"
            echo "$note" >> "$issue_body"
          }
          append_note "$ACC_INFO"
          append_note "$FDROID_INFO"
          append_note "$GPLAY_INFO"
          append_note "$AV_INFO"
          append_note "$DIRECT_INFO"

      - name: Match Accrescent signatures
        id: accEqual
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.accrescent.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match F-Droid signatures
        id: fdroidEqual
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.fdroid.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match Google Play signatures
        id: gplayEqual
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.gplay.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match AppVerifier signatures
        id: appverifierEqual
        if: needs.appverifier-db.outputs.found == 'true'
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.appverifier-db.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match direct APK signatures
        id: directEqual
        if: needs.parse.outputs.apkUrl != ''
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.direct-apk.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Count Matches
        id: count
        env:
          APK_URL: ${{ needs.parse.outputs.apkUrl }}
          AV_FOUND: ${{ needs.appverifier-db.outputs.found }}
          ACC_EQUAL: ${{ steps.accEqual.outputs.result }}
          FDROID_EQUAL: ${{ steps.fdroidEqual.outputs.result }}
          GPLAY_EQUAL: ${{ steps.gplayEqual.outputs.result }}
          AV_EQUAL: ${{ steps.appverifierEqual.outputs.result }}
          DIRECT_EQUAL: ${{ steps.directEqual.outputs.result }}
        run: |
          set -euo pipefail
          sources=3
          if [[ "$AV_FOUND" == "true" ]]; then
            sources=$((sources + 1))
          fi
          if [[ -n "$APK_URL" ]]; then
            sources=$((sources + 1))
          fi
          echo "sources=$sources" >> "$GITHUB_OUTPUT"

          i=0
          [[ "$ACC_EQUAL" == "true" ]] && i=$((i + 1))
          [[ "$FDROID_EQUAL" == "true" ]] && i=$((i + 1))
          [[ "$GPLAY_EQUAL" == "true" ]] && i=$((i + 1))
          if [[ "$AV_FOUND" == "true" && "$AV_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          if [[ -n "$APK_URL" && "$DIRECT_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          echo "$i"
          echo "matches=$i" >> "$GITHUB_OUTPUT"
          cat ${RUNNER_TEMP}/issueBody.md

      - name: Add Match Count
        env:
          MATCHES: ${{ steps.count.outputs.matches }}
          SOURCES: ${{ steps.count.outputs.sources }}
          ACC_EQUAL: ${{ steps.accEqual.outputs.result }}
          FDROID_EQUAL: ${{ steps.fdroidEqual.outputs.result }}
          GPLAY_EQUAL: ${{ steps.gplayEqual.outputs.result }}
          AV_EQUAL: ${{ steps.appverifierEqual.outputs.result }}
          DIRECT_EQUAL: ${{ steps.directEqual.outputs.result }}
          ACC_STORE_SIGNED: ${{ needs.accrescent.outputs.storeSignedMatch }}
          FDROID_STORE_SIGNED: ${{ needs.fdroid.outputs.storeSignedMatch }}
          GPLAY_STORE_SIGNED: ${{ needs.gplay.outputs.storeSignedMatch }}
          DIRECT_STORE_SIGNED: ${{ needs.direct-apk.outputs.storeSignedMatch }}
          ACC_INFO: ${{ needs.accrescent.outputs.infoNote }}
          FDROID_INFO: ${{ needs.fdroid.outputs.infoNote }}
          GPLAY_INFO: ${{ needs.gplay.outputs.infoNote }}
          AV_INFO: ${{ needs.appverifier-db.outputs.infoNote }}
          DIRECT_INFO: ${{ needs.direct-apk.outputs.infoNote }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "" >> ${RUNNER_TEMP}/issueBody.md
          has_info=false
          if [[ -n "$ACC_INFO" || -n "$FDROID_INFO" || -n "$GPLAY_INFO" || -n "$AV_INFO" || -n "$DIRECT_INFO" ]]; then
            has_info=true
          fi
          store_signed_label=false
          if [[ "$ACC_EQUAL" == "true" && "$ACC_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$FDROID_EQUAL" == "true" && "$FDROID_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$GPLAY_EQUAL" == "true" && "$GPLAY_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$DIRECT_EQUAL" == "true" && "$DIRECT_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$MATCHES" != "0" ]]; then
            echo "${MATCHES}/${SOURCES} of our sources matched what was provided. Some mismatches between app stores can be normal." >> ${RUNNER_TEMP}/issueBody.md
            if [[ "$store_signed_label" == true ]]; then
              gh issue edit "$NUMBER" --repo "$GH_REPO" --add-label "Store Signed" --remove-label "Unchecked"
            else
              gh issue edit "$NUMBER" --repo "$GH_REPO" --add-label "Likely Good" --remove-label "Unchecked"
            fi
          else
            echo "We either weren't able to grab this app from stores, or no stores matched it. Please provide a link to exactly where you downloaded it, thanks!" >> ${RUNNER_TEMP}/issueBody.md
            if [[ "$has_info" == true ]]; then
              echo "" >> ${RUNNER_TEMP}/issueBody.md
              echo "None of our sources matched the fingerprint you provided exactly, but see the notes above: For example, **Google Play App Signing** or **non-reproducible F-Droid builds** can explain a mismatch without indicating a bad submission." >> ${RUNNER_TEMP}/issueBody.md
            fi
            gh issue edit "$NUMBER" --repo "$GH_REPO" --add-label "Likely Bad" --remove-label "Unchecked"
          fi

      - name: Comment on Issue
        if: steps.count.outputs.matches == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$NUMBER" --body-file ${RUNNER_TEMP}/issueBody.md

      - name: Build PR body
        if: steps.count.outputs.matches != '0'
        env:
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          echo "**Agree with these changes? Please add a :+1: reaction to this PR!**" >> "${RUNNER_TEMP}/prBody.md"
          echo "" >> "${RUNNER_TEMP}/prBody.md"
          echo "One or more app stores matched the signature in issue #${ISSUE}, so I've created this PR automatically." >> "${RUNNER_TEMP}/prBody.md"
          echo "These entries should now be verified manually (or additional entries can be added) before merging!" >> "${RUNNER_TEMP}/prBody.md"
          echo "This PR does **not** add signatures from stores unless they also match what the submitter provided. We may need to add additional signatures to this PR if we believe the other ones are legitimate as well." >> "${RUNNER_TEMP}/prBody.md"
          echo "" >> "${RUNNER_TEMP}/prBody.md"
          echo "Closes #${ISSUE}" >> "${RUNNER_TEMP}/prBody.md"
          echo "" >> "${RUNNER_TEMP}/prBody.md"
          echo "---" >> "${RUNNER_TEMP}/prBody.md"
          echo "" >> "${RUNNER_TEMP}/prBody.md"
          cat "${RUNNER_TEMP}/issueBody.md" >> "${RUNNER_TEMP}/prBody.md"

      - name: Checkout repository
        if: steps.count.outputs.matches != '0'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        id: create-pr
        if: steps.count.outputs.matches != '0'
        uses: ./.github/actions/create-submission-pr
        with:
          packageName: ${{ needs.parse.outputs.packageName }}
          packageSignature: ${{ needs.parse.outputs.packageSignature }}
          issueNumber: ${{ github.event.issue.number }}
          prBodyFile: ${{ runner.temp }}/prBody.md
          accrescentSignature: ${{ needs.accrescent.outputs.signature }}
          fdroidSignature: ${{ needs.fdroid.outputs.signature }}
          gplaySignature: ${{ needs.gplay.outputs.signature }}
          appverifierSignature: ${{ needs.appverifier-db.outputs.signature }}
          directApkSignature: ${{ needs.direct-apk.outputs.signature }}

      - name: Label PR by matching sources
        if: steps.count.outputs.matches != '0' && steps.create-pr.outputs.prCreated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_URL: ${{ steps.create-pr.outputs.prUrl }}
          AV_FOUND: ${{ needs.appverifier-db.outputs.found }}
          ACC_EQUAL: ${{ steps.accEqual.outputs.result }}
          FDROID_EQUAL: ${{ steps.fdroidEqual.outputs.result }}
          GPLAY_EQUAL: ${{ steps.gplayEqual.outputs.result }}
          AV_EQUAL: ${{ steps.appverifierEqual.outputs.result }}
        run: |
          set -euo pipefail
          label_args=()
          [[ "$ACC_EQUAL" == "true" ]] && label_args+=(--add-label "Match Accrescent")
          if [[ "$AV_FOUND" == "true" && "$AV_EQUAL" == "true" ]]; then
            label_args+=(--add-label "Match Appverifier")
          fi
          [[ "$FDROID_EQUAL" == "true" ]] && label_args+=(--add-label "Match F-Droid")
          [[ "$GPLAY_EQUAL" == "true" ]] && label_args+=(--add-label "Match Play")
          if [[ ${#label_args[@]} -eq 0 ]]; then
            exit 0
          fi
          gh pr edit "$PR_URL" --repo "$GH_REPO" "${label_args[@]}"

  create-pr-anyways:
    name: Create PR (PR Anyways)
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'PR Anyways'

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve submitter source
        id: submitterSource
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          app_source=$(printf '%s\n' "$ISSUE_BODY" | awk -v header="App Source" '
            $0 == "### " header { found=1; next }
            found && /^### / { exit }
            found && NF { print; exit }
          ')
          app_source="${app_source//$'\r'/}"
          app_source="${app_source#"${app_source%%[![:space:]]*}"}"
          app_source="${app_source%"${app_source##*[![:space:]]}"}"
          if [[ -z "$app_source" || "$app_source" == "_No response_" ]]; then
            app_source="Submission"
          fi
          echo "value=$app_source" >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        id: existingPr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          branch="new/${ISSUE}"
          existing_pr=$(gh pr list --repo "$GH_REPO" --head "$branch" --json url -q '.[0].url' || true)
          echo "url=$existing_pr" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        if: steps.existingPr.outputs.url == ''
        env:
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          {
            echo "**Agree with these changes? Please add a :+1: reaction to this PR!**"
            echo ""
            echo "A maintainer added the **PR Anyways** label to issue #${ISSUE}."
            echo "This PR adds the package and fingerprint the submitter provided **without** requiring automatic store verification matches."
            echo "Review the submission and any prior verification comments on the issue before merging."
            echo ""
            echo "Closes #${ISSUE}"
          } > "${RUNNER_TEMP}/prBody.md"

      - name: Create PR
        id: create-pr
        if: steps.existingPr.outputs.url == ''
        uses: ./.github/actions/create-submission-pr
        with:
          packageName: ${{ needs.parse.outputs.packageName }}
          packageSignature: ${{ needs.parse.outputs.packageSignature }}
          issueNumber: ${{ github.event.issue.number }}
          prBodyFile: ${{ runner.temp }}/prBody.md
          commitSuffix: " (PR Anyways)"
          submitterSource: ${{ steps.submitterSource.outputs.value }}
