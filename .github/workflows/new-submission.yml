name: Process Submission

on:
  issues:
    types:
      - labeled

concurrency:
  group: submission-${{ github.event.issue.number }}-${{ github.event.label.name }}
  cancel-in-progress: true

jobs:
  parse:
    name: Parse Submission
    runs-on: ubuntu-latest
    outputs:
      packageName: ${{ steps.parsed.outputs.packageName }}
      packageSignature: ${{ steps.parsed.outputs.packageSignature }}
      apkUrl: ${{ steps.parsed.outputs.apkUrl }}
      customFdroidRepoUrl: ${{ steps.parsed.outputs.customFdroidRepoUrl }}
      isDuplicate: ${{ steps.duplicateCheck.outputs.isDuplicate }}
      duplicateOf: ${{ steps.duplicateCheck.outputs.duplicateOf }}
      checkApkpure: ${{ steps.checkLabels.outputs.checkApkpure }}

    if: >-
      ${{
        github.event.label.name == 'Run Checks' ||
        github.event.label.name == 'Create PR' ||
        github.event.label.name == 'Commit As-Is'
      }}

    permissions:
      contents: read
      issues: read

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Parse verification info
        id: parsed
        uses: ./.github/actions/parse-verification-info
        with:
          issueBody: ${{ github.event.issue.body }}

      - name: Print parsed submission
        run: |
          echo "Labels: ${{ toJSON(github.event.issue.labels) }}"
          echo "Package Name: ${{ steps.parsed.outputs.packageName }}"
          echo "Signature: ${{ steps.parsed.outputs.packageSignature }}"
          echo "Direct APK Link: ${{ steps.parsed.outputs.apkUrl }}"
          echo "Custom F-Droid Repository: ${{ steps.parsed.outputs.customFdroidRepoUrl }}"

      - name: Validate parsed submission
        uses: ./.github/actions/signature-lib
        with:
          operation: validate-submission
          packageName: ${{ steps.parsed.outputs.packageName }}
          packageSignature: ${{ steps.parsed.outputs.packageSignature }}

      - name: Check for duplicate submission
        id: duplicateCheck
        uses: ./.github/actions/check-duplicate-submission
        with:
          packageName: ${{ steps.parsed.outputs.packageName }}
          packageSignature: ${{ steps.parsed.outputs.packageSignature }}
          currentIssue: ${{ github.event.issue.number }}
          directApkUrl: ${{ steps.parsed.outputs.apkUrl }}
          customFdroidRepoUrl: ${{ steps.parsed.outputs.customFdroidRepoUrl }}

      - name: Detect Check APKPure label
        id: checkLabels
        run: |
          set -euo pipefail
          check_apkpure=false
          while IFS= read -r name; do
            if [[ "$name" == "Check APKPure" ]]; then
              check_apkpure=true
            fi
          done < <(echo '${{ toJSON(github.event.issue.labels) }}' | jq -r '.[].name')
          echo "checkApkpure=${check_apkpure}" >> "$GITHUB_OUTPUT"

  closeDuplicate:
    name: Close Duplicate Submission
    runs-on: ubuntu-latest
    needs: parse
    if: >-
      needs.parse.outputs.isDuplicate == 'true' &&
      (
        github.event.label.name == 'Run Checks' ||
        github.event.label.name == 'Create PR' ||
        github.event.label.name == 'Commit As-Is'
      )

    permissions:
      issues: write

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"
          
      - name: Close issue as duplicate
        uses: ./.github/actions/close-duplicate-submission
        with:
          duplicateOf: ${{ needs.parse.outputs.duplicateOf }}
          currentIssue: ${{ github.event.issue.number }}
          currentAuthor: ${{ github.event.issue.user.login }}

  labelUserSpecifiedDownload:
    name: Label User-Specified Download
    runs-on: ubuntu-latest
    needs: parse
    if: >-
      needs.parse.outputs.isDuplicate != 'true' &&
      github.event.label.name == 'Run Checks' &&
      (
        needs.parse.outputs.apkUrl != '' ||
        needs.parse.outputs.customFdroidRepoUrl != ''
      )

    permissions:
      issues: write

    steps:
      - name: Add User-Specified Download label
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$NUMBER" --repo "$GH_REPO" --add-label "User-Specified Download"

  accrescent:
    name: Accrescent
    runs-on: ubuntu-latest
    needs: parse
    if: false
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      found: ${{ steps.availability.outputs.found }}
      signature: ${{ steps.appSignature.outputs.signature }}
      apkSha256: ${{ steps.appSignature.outputs.apkSha256 }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Get App Info From API
        id: appInfo
        continue-on-error: true
        uses: ./.github/actions/get-accrescent-app
        with:
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Check app availability
        id: availability
        if: always()
        env:
          DOWNLOAD_INFO: ${{ steps.appInfo.outputs.downloadInfo }}
        run: |
          set -euo pipefail
          if [[ "${{ steps.appInfo.outcome }}" != "success" || -z "${DOWNLOAD_INFO:-}" ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          url_count=$(printf '%s\n' "$DOWNLOAD_INFO" | jq '[.split_download_info[]? | select((.url // "") != "")] | length')
          if [[ "$url_count" -gt 0 ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Print App Info
        id: accrescentInfo
        if: steps.availability.outputs.found == 'true'
        env:
          DOWNLOAD_INFO: ${{ steps.appInfo.outputs.downloadInfo }}
        run: |
          printf '%s\n' "$DOWNLOAD_INFO" | jq .
          firstUrl=$(printf '%s\n' "$DOWNLOAD_INFO" | jq -r '.split_download_info[0].url')
          firstApk=$(basename "$firstUrl")
          echo "First URL: $firstUrl"
          echo "APK Basename: $firstApk"
          echo "apkUrl=$firstUrl" >> "$GITHUB_OUTPUT"
          echo "apkName=$firstApk" >> "$GITHUB_OUTPUT"

      - name: Restore APK Cache
        if: steps.availability.outputs.found == 'true'
        id: apkCache
        uses: actions/cache@v5
        with:
          path: ${{ steps.accrescentInfo.outputs.apkName }}
          key: accrescent-${{ env.PACKAGE_NAME }}-${{ steps.accrescentInfo.outputs.apkName }}

      - name: Download APKs
        if: steps.availability.outputs.found == 'true' && steps.apkCache.outputs.cache-hit != 'true'
        id: appDownload
        env:
          DOWNLOAD_INFO: ${{ steps.accrescentInfo.outputs.apkUrl }}
        run: |
          wget "$DOWNLOAD_INFO"

      - name: Get APK signature(s)
        id: appSignature
        if: steps.availability.outputs.found == 'true'
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.accrescentInfo.outputs.apkName }}
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Write Summary
        if: steps.availability.outputs.found == 'true'
        id: summary
        env:
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Matches User-Provided?
        id: matches
        if: steps.availability.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

  fdroid:
    name: F-Droid
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && (github.event.label.name == 'Run Checks' || github.event.label.name == 'Create PR' || github.event.label.name == 'Commit As-Is')
    continue-on-error: true
    permissions:
      contents: read

    strategy:
      matrix:
        fDroidRepoName: ["F-Droid", "IzzyOnDroid"]
        include:
          - fDroidRepoName: F-Droid
            fDroidRepoURL: https://f-droid.org/repo
          - fDroidRepoName: IzzyOnDroid
            fDroidRepoURL: https://apt.izzysoft.de/fdroid/repo

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}
      USER_SIGNATURE: ${{ needs.parse.outputs.packageSignature }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Download F-Droid App
        id: appDownload
        uses: ./.github/actions/download-fdroid
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          fDroidRepoName: ${{ matrix.fDroidRepoName }}
          fDroidRepoURL: ${{ matrix.fDroidRepoURL }}

      - name: Get APK Signature
        id: appSignature
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.appDownload.outputs.apkPath }}
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Matches User-Provided?
        id: matches
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ env.USER_SIGNATURE }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

      - name: Write job summary
        if: steps.appDownload.outputs.found == 'true'
        env:
          REPO_NAME: ${{ matrix.fDroidRepoName }}
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "F-Droid (${REPO_NAME})" >> $GITHUB_STEP_SUMMARY
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Write repository result
        if: always()
        env:
          REPO_NAME: ${{ matrix.fDroidRepoName }}
          FOUND: ${{ steps.appDownload.outputs.found }}
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
          APK_SHA256: ${{ steps.appSignature.outputs.apkSha256 }}
          MATCH: ${{ steps.matches.outputs.status }}
          PKG: ${{ steps.matches.outputs.packageName }}
          INFO_NOTE: ${{ steps.matches.outputs.infoNote }}
          STORE_SIGNED: ${{ steps.matches.outputs.storeSignedMatch }}
        run: |
          set -euo pipefail
          mkdir -p fdroid-result
          jq -n \
            --arg repoName "$REPO_NAME" \
            --arg found "$FOUND" \
            --arg signature "$SIGNATURE" \
            --arg apkSha256 "$APK_SHA256" \
            --arg match "$MATCH" \
            --arg packageName "$PKG" \
            --arg infoNote "$INFO_NOTE" \
            --arg storeSignedMatch "$STORE_SIGNED" \
            '{
              repoName: $repoName,
              found: ($found == "true"),
              signature: $signature,
              apkSha256: $apkSha256,
              match: $match,
              packageName: $packageName,
              infoNote: $infoNote,
              storeSignedMatch: ($storeSignedMatch == "true")
            }' > "fdroid-result/${REPO_NAME}.json"

      - name: Upload repository result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fdroid-result-${{ matrix.fDroidRepoName }}
          path: fdroid-result/${{ matrix.fDroidRepoName }}.json
          if-no-files-found: ignore

  customFdroid:
    name: Custom F-Droid Repository
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && (github.event.label.name == 'Run Checks' || github.event.label.name == 'Create PR' || github.event.label.name == 'Commit As-Is') && needs.parse.outputs.customFdroidRepoUrl != ''
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      apkSha256: ${{ steps.appSignature.outputs.apkSha256 }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}
      USER_SIGNATURE: ${{ needs.parse.outputs.packageSignature }}
      FDROID_REPO_URL: ${{ needs.parse.outputs.customFdroidRepoUrl }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Resolve custom repository label
        id: customRepo
        env:
          FDROID_REPO_URL: ${{ env.FDROID_REPO_URL }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          host=$(signatures_fdroid_repo_host_from_url "$FDROID_REPO_URL")
          echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Download F-Droid App
        id: appDownload
        uses: ./.github/actions/download-fdroid
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          fDroidRepoName: ${{ steps.customRepo.outputs.host }}
          fDroidRepoURL: ${{ env.FDROID_REPO_URL }}

      - name: Get APK Signature
        id: appSignature
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.appDownload.outputs.apkPath }}
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Matches User-Provided?
        id: matches
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ env.USER_SIGNATURE }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

      - name: Write job summary
        if: steps.appDownload.outputs.found == 'true'
        env:
          REPO_NAME: ${{ steps.customRepo.outputs.host }}
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "F-Droid (${REPO_NAME})" >> $GITHUB_STEP_SUMMARY
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Write repository result
        if: always()
        env:
          REPO_NAME: ${{ steps.customRepo.outputs.host }}
          FOUND: ${{ steps.appDownload.outputs.found }}
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
          APK_SHA256: ${{ steps.appSignature.outputs.apkSha256 }}
          MATCH: ${{ steps.matches.outputs.status }}
          PKG: ${{ steps.matches.outputs.packageName }}
          INFO_NOTE: ${{ steps.matches.outputs.infoNote }}
          STORE_SIGNED: ${{ steps.matches.outputs.storeSignedMatch }}
        run: |
          set -euo pipefail
          mkdir -p fdroid-result
          jq -n \
            --arg repoName "$REPO_NAME" \
            --arg found "$FOUND" \
            --arg signature "$SIGNATURE" \
            --arg apkSha256 "$APK_SHA256" \
            --arg match "$MATCH" \
            --arg packageName "$PKG" \
            --arg infoNote "$INFO_NOTE" \
            --arg storeSignedMatch "$STORE_SIGNED" \
            '{
              repoName: $repoName,
              found: ($found == "true"),
              signature: $signature,
              apkSha256: $apkSha256,
              match: $match,
              packageName: $packageName,
              infoNote: $infoNote,
              storeSignedMatch: ($storeSignedMatch == "true")
            }' > "fdroid-result/${REPO_NAME}.json"

      - name: Upload repository result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fdroid-result-${{ steps.customRepo.outputs.host }}
          path: fdroid-result/${{ steps.customRepo.outputs.host }}.json
          if-no-files-found: ignore

  gplay:
    name: Google Play
    runs-on: ubuntu-latest
    needs: parse
    concurrency:
      group: gplay-downloads
      cancel-in-progress: false
      queue: max

    if: needs.parse.outputs.isDuplicate != 'true' && (github.event.label.name == 'Run Checks' || github.event.label.name == 'Create PR' || github.event.label.name == 'Commit As-Is')
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      found: ${{ steps.appDownload.outputs.found }}
      signature: ${{ steps.appSignature.outputs.signature }}
      apkSha256: ${{ steps.appSignature.outputs.apkSha256 }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Download from Google Play
        id: appDownload
        uses: ./.github/actions/download-apk-apkeep
        with:
          packageName: ${{ env.PACKAGE_NAME }}
        env:
          GPLAY_EMAIL: ${{ secrets.GPLAY_EMAIL }}
          GPLAY_AAS_TOKEN: ${{ secrets.GPLAY_AAS_TOKEN }}

      - name: Get APK signature(s)
        id: appSignature
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.appDownload.outputs.apkPath }}
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Matches User-Provided?
        id: matches
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

      - name: Write Summary
        if: steps.appDownload.outputs.found == 'true'
        id: summary
        env:
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

  apkpure:
    name: APKPure
    runs-on: ubuntu-latest
    needs: parse
    concurrency:
      group: apkpure-downloads
      cancel-in-progress: false
      queue: max

    if: >-
      needs.parse.outputs.isDuplicate != 'true' &&
      (
        github.event.label.name == 'Run Checks' ||
        github.event.label.name == 'Create PR' ||
        github.event.label.name == 'Commit As-Is'
      ) &&
      needs.parse.outputs.checkApkpure == 'true'
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      found: ${{ steps.appDownload.outputs.found }}
      signature: ${{ steps.appSignature.outputs.signature }}
      apkSha256: ${{ steps.appSignature.outputs.apkSha256 }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Download from APKPure
        id: appDownload
        uses: ./.github/actions/download-apk-apkeep
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          source: apk-pure

      - name: Get APK signature(s)
        id: appSignature
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.appDownload.outputs.apkPath }}
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Matches User-Provided?
        id: matches
        if: steps.appDownload.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

      - name: Write Summary
        if: steps.appDownload.outputs.found == 'true'
        env:
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

  directApk:
    name: Direct APK Link
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && (github.event.label.name == 'Run Checks' || github.event.label.name == 'Create PR' || github.event.label.name == 'Commit As-Is') && needs.parse.outputs.apkUrl != ''
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      apkSha256: ${{ steps.appSignature.outputs.apkSha256 }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.matches.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}
      APK_URL: ${{ needs.parse.outputs.apkUrl }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: APK cache key
        id: apkCacheKey
        run: |
          url_hash=$(printf '%s' "$APK_URL" | sha256sum | awk '{print $1}')
          echo "cacheKey=direct-apk-${url_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore APK Cache
        id: apkCache
        uses: actions/cache@v5
        with:
          path: direct-apk.apk
          key: ${{ steps.apkCacheKey.outputs.cacheKey }}

      - name: Download APK
        if: steps.apkCache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 -o direct-apk.apk "$APK_URL"
          file direct-apk.apk
          if ! file direct-apk.apk | grep -qiE 'zip archive|android'; then
            echo "Downloaded file does not look like an APK" >&2
            exit 1
          fi

      - name: Get APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: direct-apk.apk
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Write Summary
        id: summary
        env:
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Matches User-Provided?
        id: matches
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.appSignature.outputs.signature }}
          signerKind: ${{ steps.appSignature.outputs.signerKind }}

  appverifierDb:
    name: AppVerifier
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.isDuplicate != 'true' && (github.event.label.name == 'Run Checks' || github.event.label.name == 'Create PR' || github.event.label.name == 'Commit As-Is')
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      found: ${{ steps.lookup.outputs.found }}
      signature: ${{ steps.lookup.outputs.signature }}
      allFingerprints: ${{ steps.lookup.outputs.allFingerprints }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}
      infoNote: ${{ steps.combinedNote.outputs.infoNote }}
      storeSignedMatch: ${{ steps.matches.outputs.storeSignedMatch }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Lookup internal database fingerprints
        id: lookup
        uses: ./.github/actions/lookup-appverifier-database
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}

      - name: Matches User-Provided?
        id: matches
        if: steps.lookup.outputs.found == 'true'
        uses: ./.github/actions/match-signature
        with:
          packageName: ${{ env.PACKAGE_NAME }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}
          storeSignature: ${{ steps.lookup.outputs.signature }}

      - name: Combine informational notes
        if: steps.lookup.outputs.found == 'true'
        id: combinedNote
        env:
          LOOKUP_NOTE: ${{ steps.lookup.outputs.infoNote }}
          MATCH_NOTE: ${{ steps.matches.outputs.infoNote }}
        run: |
          note=""
          if [[ -n "$LOOKUP_NOTE" ]]; then
            note="$LOOKUP_NOTE"
          fi
          if [[ -n "$MATCH_NOTE" ]]; then
            if [[ -n "$note" ]]; then
              note+=$'\n\n'
            fi
            note+="$MATCH_NOTE"
          fi
          if [[ -n "$note" ]]; then
            source .github/actions/signature-lib/signatures.lib.sh
            gha_write_multiline_output infoNote "$note"
          else
            echo "infoNote=" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Summary
        id: summary
        if: steps.lookup.outputs.found == 'true'
        env:
          SIGNATURE: ${{ steps.lookup.outputs.signature }}
          SOURCES: ${{ steps.lookup.outputs.sources }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "Sources in AppVerifier database: $SOURCES" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

  grapheneosForum:
    name: GrapheneOS Forum
    runs-on: ubuntu-latest
    needs: parse
    if: false
    continue-on-error: true
    permissions:
      contents: read

    outputs:
      found: ${{ steps.lookup.outputs.found }}
      signature: ${{ steps.lookup.outputs.signature }}
      match: ${{ steps.lookup.outputs.match }}
      packageName: ${{ steps.lookup.outputs.packageName }}
      infoNote: ${{ steps.lookup.outputs.infoNote }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Lookup GrapheneOS forum submissions
        id: lookup
        uses: ./.github/actions/lookup-grapheneos-forum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          packageName: ${{ needs.parse.outputs.packageName }}
          userSignature: ${{ needs.parse.outputs.packageSignature }}

  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [parse, accrescent, fdroid, customFdroid, gplay, apkpure, appverifierDb, directApk, grapheneosForum]

    if: always() && needs.parse.outputs.isDuplicate != 'true' && github.event.label.name == 'Run Checks'
    permissions:
      contents: read
      issues: write

    steps:

      - name: Validate
        run: |
          if [[ "${{ needs.parse.outputs.packageName }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ github.event.label.name }}" != "Run Checks" ]]; then
            exit 1
          fi

      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Download F-Droid results
        uses: actions/download-artifact@v8
        with:
          pattern: fdroid-result-*
          merge-multiple: true
          path: fdroid-results

      - name: Create Table
        env:
          USER_PKG: ${{ needs.parse.outputs.packageName }}
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          ACC_FOUND: ${{ needs.accrescent.outputs.found }}
          ACC_MATCH: ${{ needs.accrescent.outputs.match }}
          ACC_PKG: ${{ needs.accrescent.outputs.packageName }}
          ACC_SIG: ${{ needs.accrescent.outputs.signature }}
          GPLAY_FOUND: ${{ needs.gplay.outputs.found }}
          GPLAY_MATCH: ${{ needs.gplay.outputs.match }}
          GPLAY_PKG: ${{ needs.gplay.outputs.packageName }}
          GPLAY_SIG: ${{ needs.gplay.outputs.signature }}
          CHECK_APKPURE: ${{ needs.parse.outputs.checkApkpure }}
          APKPURE_FOUND: ${{ needs.apkpure.outputs.found }}
          APKPURE_MATCH: ${{ needs.apkpure.outputs.match }}
          APKPURE_PKG: ${{ needs.apkpure.outputs.packageName }}
          APKPURE_SIG: ${{ needs.apkpure.outputs.signature }}
          AV_FOUND: ${{ needs.appverifierDb.outputs.found }}
          AV_MATCH: ${{ needs.appverifierDb.outputs.match }}
          AV_PKG: ${{ needs.appverifierDb.outputs.packageName }}
          AV_SIG: ${{ needs.appverifierDb.outputs.signature }}
          DIRECT_MATCH: ${{ needs.directApk.outputs.match }}
          DIRECT_PKG: ${{ needs.directApk.outputs.packageName }}
          DIRECT_SIG: ${{ needs.directApk.outputs.signature }}
          GO_FOUND: ${{ needs.grapheneosForum.outputs.found }}
          GO_MATCH: ${{ needs.grapheneosForum.outputs.match }}
          GO_PKG: ${{ needs.grapheneosForum.outputs.packageName }}
          GO_SIG: ${{ needs.grapheneosForum.outputs.signature }}
          APK_URL: ${{ needs.parse.outputs.apkUrl }}
          CUSTOM_FDROID_REPO_URL: ${{ needs.parse.outputs.customFdroidRepoUrl }}
        run: |
          set -euo pipefail
          format_sig_cell() {
            local pkg="$1"
            local sig="$2"
            local sig_html="${sig//$'\n'/<br>}"
            printf '%s<br>%s' "$pkg" "$sig_html"
          }
          intro="We attempted to check Accrescent, F-Droid (F-Droid and IzzyOnDroid), Google Play"
          extras=()
          if [[ "$AV_FOUND" == "true" ]]; then
            extras+=("AppVerifier's internal database")
          fi
          if [[ "$GO_FOUND" == "true" ]]; then
            extras+=("the GrapheneOS forum submissions export")
          fi
          if [[ -n "$CUSTOM_FDROID_REPO_URL" ]]; then
            extras+=("your custom F-Droid repository")
          fi
          if [[ -n "$APK_URL" ]]; then
            extras+=("your direct APK link")
          fi
          if [[ "$CHECK_APKPURE" == "true" ]]; then
            extras+=("APKPure")
          fi
          if [[ ${#extras[@]} -gt 0 ]]; then
            extras_joined=""
            for extra in "${extras[@]}"; do
              if [[ -n "$extras_joined" ]]; then
                extras_joined+=", "
              fi
              extras_joined+="$extra"
            done
            intro+=", ${extras_joined}"
          fi
          intro+=" for this app. If we found any results, they'll be in the table below:"
          echo "$intro" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Matches | Verification |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|"  >> $GITHUB_STEP_SUMMARY
          echo "| User-Provided | :arrow_down: | $(format_sig_cell "$USER_PKG" "$USER_SIG") |" >> $GITHUB_STEP_SUMMARY
          if [[ "$ACC_FOUND" == "true" ]]; then
            echo "| Accrescent | $ACC_MATCH | $(format_sig_cell "$ACC_PKG" "$ACC_SIG") |" >> $GITHUB_STEP_SUMMARY
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            found=$(jq -r '.found' "$result_file")
            [[ "$found" != "true" ]] && continue
            repo_name=$(jq -r '.repoName' "$result_file")
            match=$(jq -r '.match' "$result_file")
            pkg=$(jq -r '.packageName' "$result_file")
            sig=$(jq -r '.signature' "$result_file")
            echo "| F-Droid (${repo_name}) | ${match} | $(format_sig_cell "$pkg" "$sig") |" >> $GITHUB_STEP_SUMMARY
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null | sort)
          if [[ "$GPLAY_FOUND" == "true" ]]; then
            echo "| Google Play | $GPLAY_MATCH | $(format_sig_cell "$GPLAY_PKG" "$GPLAY_SIG") |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" ]]; then
            echo "| APKPure | $APKPURE_MATCH | $(format_sig_cell "$APKPURE_PKG" "$APKPURE_SIG") |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$AV_FOUND" == "true" ]]; then
            echo "| AppVerifier | $AV_MATCH | $(format_sig_cell "$AV_PKG" "$AV_SIG") |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "$GO_FOUND" == "true" ]]; then
            echo "| GrapheneOS Forum | $GO_MATCH | $(format_sig_cell "$GO_PKG" "$GO_SIG") |" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "$APK_URL" ]]; then
            echo "| Direct APK Link | $DIRECT_MATCH | $(format_sig_cell "$DIRECT_PKG" "$DIRECT_SIG") |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":exclamation: We scanned the APK file at \`${APK_URL}\` which the submitter provided. This does not indicate its legitimacy, you must confirm this is a legitimate source." >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "$CUSTOM_FDROID_REPO_URL" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":exclamation: We checked the F-Droid repository at \`${CUSTOM_FDROID_REPO_URL}\` which the submitter provided. This does not indicate its legitimacy, you must confirm this is a legitimate source." >> $GITHUB_STEP_SUMMARY
          fi
          cat "$GITHUB_STEP_SUMMARY" > ${RUNNER_TEMP}/issueBody.md

      - name: Find related packages in data.yml
        id: relatedPackages
        uses: ./.github/actions/signature-lib
        with:
          operation: find-related-packages
          packageName: ${{ needs.parse.outputs.packageName }}
          packageSignature: ${{ needs.parse.outputs.packageSignature }}

      - name: Append matching fingerprints from other packages
        if: steps.relatedPackages.outputs.relatedLines != ''
        env:
          RELATED_LINES: ${{ steps.relatedPackages.outputs.relatedLines }}
        run: |
          set -euo pipefail
          issue_body="${RUNNER_TEMP}/issueBody.md"
          {
            echo ""
            echo "This fingerprint matches another app already confirmed in our database! This may indicate it's from the same developer, you should check. If so, this is a stronger indication that this submission is legitimate:"
            echo ""
            echo "$RELATED_LINES"
          } | tee -a "$GITHUB_STEP_SUMMARY" >> "$issue_body"

      - name: Append informational notes
        env:
          ACC_INFO: ${{ needs.accrescent.outputs.infoNote }}
          GPLAY_INFO: ${{ needs.gplay.outputs.infoNote }}
          APKPURE_INFO: ${{ needs.apkpure.outputs.infoNote }}
          AV_INFO: ${{ needs.appverifierDb.outputs.infoNote }}
          GO_INFO: ${{ needs.grapheneosForum.outputs.infoNote }}
          DIRECT_INFO: ${{ needs.directApk.outputs.infoNote }}
        run: |
          issue_body="${RUNNER_TEMP}/issueBody.md"
          printed_file="${RUNNER_TEMP}/printed-notes.txt"
          : > "$printed_file"
          append_note() {
            local note="$1"
            [[ -z "$note" ]] && return
            if grep -Fxq "$note" "$printed_file" 2>/dev/null; then
              return
            fi
            printf '%s\n' "$note" >> "$printed_file"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$note" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$issue_body"
            echo "$note" >> "$issue_body"
          }
          if [[ "${{ needs.accrescent.outputs.found }}" == "true" ]]; then
            append_note "$ACC_INFO"
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            note=$(jq -r '.infoNote // ""' "$result_file")
            append_note "$note"
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null | sort)
          if [[ "${{ needs.gplay.outputs.found }}" == "true" ]]; then
            append_note "$GPLAY_INFO"
          fi
          if [[ "${{ needs.parse.outputs.checkApkpure }}" == "true" && "${{ needs.apkpure.outputs.found }}" == "true" ]]; then
            append_note "$APKPURE_INFO"
          fi
          append_note "$AV_INFO"
          append_note "$GO_INFO"
          append_note "$DIRECT_INFO"

      - name: Match Accrescent signatures
        id: accEqual
        if: needs.accrescent.outputs.found == 'true'
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.accrescent.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match Google Play signatures
        id: gplayEqual
        if: needs.gplay.outputs.found == 'true'
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.gplay.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match APKPure signatures
        id: apkpureEqual
        if: needs.parse.outputs.checkApkpure == 'true' && needs.apkpure.outputs.found == 'true'
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.apkpure.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match AppVerifier signatures
        id: appverifierEqual
        if: needs.appverifierDb.outputs.found == 'true'
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.appverifierDb.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Match direct APK signatures
        id: directEqual
        if: needs.parse.outputs.apkUrl != ''
        uses: ./.github/actions/signature-lib
        with:
          operation: signatures-equal
          signatureA: ${{ needs.directApk.outputs.signature }}
          signatureB: ${{ needs.parse.outputs.packageSignature }}

      - name: Count Matches
        id: count
        env:
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          APK_URL: ${{ needs.parse.outputs.apkUrl }}
          CUSTOM_FDROID_REPO_URL: ${{ needs.parse.outputs.customFdroidRepoUrl }}
          CHECK_APKPURE: ${{ needs.parse.outputs.checkApkpure }}
          ACC_FOUND: ${{ needs.accrescent.outputs.found }}
          GPLAY_FOUND: ${{ needs.gplay.outputs.found }}
          APKPURE_FOUND: ${{ needs.apkpure.outputs.found }}
          AV_FOUND: ${{ needs.appverifierDb.outputs.found }}
          ACC_EQUAL: ${{ steps.accEqual.outputs.result }}
          GPLAY_EQUAL: ${{ steps.gplayEqual.outputs.result }}
          APKPURE_EQUAL: ${{ steps.apkpureEqual.outputs.result }}
          AV_EQUAL: ${{ steps.appverifierEqual.outputs.result }}
          DIRECT_EQUAL: ${{ steps.directEqual.outputs.result }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh

          sources=0
          [[ "$ACC_FOUND" == "true" ]] && sources=$((sources + 1))
          [[ "$GPLAY_FOUND" == "true" ]] && sources=$((sources + 1))
          if [[ "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" ]]; then
            sources=$((sources + 1))
          fi
          if [[ "$AV_FOUND" == "true" ]]; then
            sources=$((sources + 1))
          fi
          if [[ -n "$APK_URL" ]]; then
            sources=$((sources + 1))
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ "$(jq -r '.found' "$result_file")" != "true" ]] && continue
            sources=$((sources + 1))
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null)
          echo "sources=$sources" >> "$GITHUB_OUTPUT"

          i=0
          if [[ "$ACC_FOUND" == "true" && "$ACC_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          if [[ "$GPLAY_FOUND" == "true" && "$GPLAY_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          if [[ "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" && "$APKPURE_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ "$(jq -r '.found' "$result_file")" != "true" ]] && continue
            sig=$(jq -r '.signature' "$result_file")
            if signatures_equal "$sig" "$USER_SIG"; then
              i=$((i + 1))
            fi
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null)
          if [[ "$AV_FOUND" == "true" && "$AV_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          if [[ -n "$APK_URL" && "$DIRECT_EQUAL" == "true" ]]; then
            i=$((i + 1))
          fi
          echo "$i"
          echo "matches=$i" >> "$GITHUB_OUTPUT"

          store_matches=0
          if [[ "$ACC_FOUND" == "true" && "$ACC_EQUAL" == "true" ]]; then
            store_matches=$((store_matches + 1))
          fi
          if [[ "$GPLAY_FOUND" == "true" && "$GPLAY_EQUAL" == "true" ]]; then
            store_matches=$((store_matches + 1))
          fi
          if [[ "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" && "$APKPURE_EQUAL" == "true" ]]; then
            store_matches=$((store_matches + 1))
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ "$(jq -r '.found' "$result_file")" != "true" ]] && continue
            sig=$(jq -r '.signature' "$result_file")
            if signatures_equal "$sig" "$USER_SIG"; then
              store_matches=$((store_matches + 1))
            fi
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null)
          echo "storeMatches=$store_matches" >> "$GITHUB_OUTPUT"
          cat ${RUNNER_TEMP}/issueBody.md

      - name: Add Match Count
        env:
          MATCHES: ${{ steps.count.outputs.matches }}
          SOURCES: ${{ steps.count.outputs.sources }}
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          ACC_FOUND: ${{ needs.accrescent.outputs.found }}
          CHECK_APKPURE: ${{ needs.parse.outputs.checkApkpure }}
          GPLAY_FOUND: ${{ needs.gplay.outputs.found }}
          APKPURE_FOUND: ${{ needs.apkpure.outputs.found }}
          ACC_EQUAL: ${{ steps.accEqual.outputs.result }}
          GPLAY_EQUAL: ${{ steps.gplayEqual.outputs.result }}
          APKPURE_EQUAL: ${{ steps.apkpureEqual.outputs.result }}
          AV_EQUAL: ${{ steps.appverifierEqual.outputs.result }}
          DIRECT_EQUAL: ${{ steps.directEqual.outputs.result }}
          ACC_STORE_SIGNED: ${{ needs.accrescent.outputs.storeSignedMatch }}
          GPLAY_STORE_SIGNED: ${{ needs.gplay.outputs.storeSignedMatch }}
          APKPURE_STORE_SIGNED: ${{ needs.apkpure.outputs.storeSignedMatch }}
          DIRECT_STORE_SIGNED: ${{ needs.directApk.outputs.storeSignedMatch }}
          ACC_INFO: ${{ needs.accrescent.outputs.infoNote }}
          GPLAY_INFO: ${{ needs.gplay.outputs.infoNote }}
          APKPURE_INFO: ${{ needs.apkpure.outputs.infoNote }}
          AV_INFO: ${{ needs.appverifierDb.outputs.infoNote }}
          DIRECT_INFO: ${{ needs.directApk.outputs.infoNote }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          fdroid_has_info=false
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ -n "$(jq -r '.infoNote // ""' "$result_file")" ]] && fdroid_has_info=true
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null)

          echo "" >> ${RUNNER_TEMP}/issueBody.md
          has_info=false
          if [[ ( "$ACC_FOUND" == "true" && -n "$ACC_INFO" ) || ( "$GPLAY_FOUND" == "true" && -n "$GPLAY_INFO" ) || ( "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" && -n "$APKPURE_INFO" ) || -n "$AV_INFO" || -n "$DIRECT_INFO" || "$fdroid_has_info" == true ]]; then
            has_info=true
          fi
          store_signed_label=false
          if [[ "$ACC_FOUND" == "true" && "$ACC_EQUAL" == "true" && "$ACC_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ "$(jq -r '.found' "$result_file")" != "true" ]] && continue
            [[ "$(jq -r '.storeSignedMatch' "$result_file")" != "true" ]] && continue
            sig=$(jq -r '.signature' "$result_file")
            if signatures_equal "$sig" "$USER_SIG"; then
              store_signed_label=true
            fi
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null)
          if [[ "$GPLAY_FOUND" == "true" && "$GPLAY_EQUAL" == "true" && "$GPLAY_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" && "$APKPURE_EQUAL" == "true" && "$APKPURE_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$DIRECT_EQUAL" == "true" && "$DIRECT_STORE_SIGNED" == "true" ]]; then
            store_signed_label=true
          fi
          if [[ "$MATCHES" != "0" ]]; then
            echo "${MATCHES}/${SOURCES} of our sources matched what was provided. Some mismatches between app stores can be normal." >> ${RUNNER_TEMP}/issueBody.md
            if [[ "$store_signed_label" == true ]]; then
              gh issue edit "$NUMBER" --repo "$GH_REPO" --add-label "Store Signed"
            fi
          else
            echo "We either weren't able to grab this app from stores, or no stores matched it. Please provide a link to exactly where you downloaded it, thanks!" >> ${RUNNER_TEMP}/issueBody.md
            if [[ "$has_info" == true ]]; then
              echo "" >> ${RUNNER_TEMP}/issueBody.md
              echo "None of our sources matched the fingerprint you provided exactly, but see the notes above: For example, **Google Play App Signing** or **non-reproducible F-Droid builds** can explain a mismatch without indicating a bad submission." >> ${RUNNER_TEMP}/issueBody.md
            fi
          fi

      - name: Append as-is database preview
        env:
          PACKAGE: ${{ needs.parse.outputs.packageName }}
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          ISSUE: ${{ github.event.issue.number }}
          ACC_SIG: ${{ needs.accrescent.outputs.signature }}
          FDROID_RESULTS_DIR: fdroid-results
          GPLAY_SIG: ${{ needs.gplay.outputs.signature }}
          APKPURE_SIG: ${{ needs.apkpure.outputs.signature }}
          APPVERIFIER_SIG: ${{ needs.appverifierDb.outputs.signature }}
          DIRECT_SIG: ${{ needs.directApk.outputs.signature }}
          DIRECT_APK_URL: ${{ needs.parse.outputs.apkUrl }}
          DIRECT_APK_SHA256: ${{ needs.directApk.outputs.apkSha256 }}
          CUSTOM_FDROID_REPO_URL: ${{ needs.parse.outputs.customFdroidRepoUrl }}
          CUSTOM_FDROID_APK_SHA256: ${{ needs.customFdroid.outputs.apkSha256 }}
          ACC_APK_SHA256: ${{ needs.accrescent.outputs.apkSha256 }}
          GPLAY_APK_SHA256: ${{ needs.gplay.outputs.apkSha256 }}
          APKPURE_APK_SHA256: ${{ needs.apkpure.outputs.apkSha256 }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          issue_body="${RUNNER_TEMP}/issueBody.md"
          entry="$(mktemp)"
          if ! submission_build_entry_file "$entry"; then
            {
              echo ""
              echo "We could not build a database entry from store matches alone, so there is no as-is preview. Add the **Create PR** label after review if you want to merge signatures manually."
            } | tee -a "$issue_body" >> "$GITHUB_STEP_SUMMARY"
            rm -f "$entry"
            exit 0
          fi
          preview="$(submission_format_package_merge_diff "$entry")"
          rm -f "$entry"
          {
            echo ""
            echo "If committed as-is, \`data.yml\` would change as follows (store signatures that matched the submitter's fingerprint):"
            echo ""
            echo '```diff'
            printf '%s\n' "$preview"
            echo '```'
            echo ""
            echo "Maintainers: add **Commit As-Is** to accept this entry on \`main\` immediately, or **Create PR** to open a pull request for manual edits first."
          } | tee -a "$issue_body" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$NUMBER" --body-file ${RUNNER_TEMP}/issueBody.md

      - name: Label issue by matching sources
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          STORE_MATCHES: ${{ steps.count.outputs.storeMatches }}
          ACC_FOUND: ${{ needs.accrescent.outputs.found }}
          CHECK_APKPURE: ${{ needs.parse.outputs.checkApkpure }}
          GPLAY_FOUND: ${{ needs.gplay.outputs.found }}
          APKPURE_FOUND: ${{ needs.apkpure.outputs.found }}
          AV_FOUND: ${{ needs.appverifierDb.outputs.found }}
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          ACC_EQUAL: ${{ steps.accEqual.outputs.result }}
          GPLAY_EQUAL: ${{ steps.gplayEqual.outputs.result }}
          APKPURE_EQUAL: ${{ steps.apkpureEqual.outputs.result }}
          AV_EQUAL: ${{ steps.appverifierEqual.outputs.result }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          label_args=()
          if [[ "$STORE_MATCHES" == "0" ]]; then
            label_args+=(--add-label "No Store Match")
          fi
          if [[ "$ACC_FOUND" == "true" && "$ACC_EQUAL" == "true" ]]; then
            label_args+=(--add-label "Match Accrescent")
          fi
          if [[ "$AV_FOUND" == "true" && "$AV_EQUAL" == "true" ]]; then
            label_args+=(--add-label "Match Appverifier")
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ "$(jq -r '.found' "$result_file")" != "true" ]] && continue
            repo_name=$(jq -r '.repoName' "$result_file")
            sig=$(jq -r '.signature' "$result_file")
            if ! signatures_equal "$sig" "$USER_SIG"; then
              continue
            fi
            if [[ "$repo_name" == "IzzyOnDroid" ]]; then
              label_args+=(--add-label "Match IzzyOnDroid")
            else
              label_args+=(--add-label "Match F-Droid")
            fi
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null | sort)
          if [[ "$GPLAY_FOUND" == "true" && "$GPLAY_EQUAL" == "true" ]]; then
            label_args+=(--add-label "Match Play")
          fi
          if [[ "$CHECK_APKPURE" == "true" && "$APKPURE_FOUND" == "true" && "$APKPURE_EQUAL" == "true" ]]; then
            label_args+=(--add-label "Match APKPure")
          fi
          if [[ ${#label_args[@]} -eq 0 ]]; then
            exit 0
          fi
          gh issue edit "$NUMBER" --repo "$GH_REPO" "${label_args[@]}"

      - name: Remove Run Checks label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: gh issue edit "$NUMBER" --repo "$GH_REPO" --remove-label "Run Checks" || true

  createPr:
    name: Create PR
    runs-on: ubuntu-latest
    concurrency:
      group: data-yml-writes
      cancel-in-progress: false
      queue: max
    needs: [parse, accrescent, fdroid, customFdroid, gplay, apkpure, appverifierDb, directApk]
    if: |
      always() &&
      !cancelled() &&
      needs.parse.result == 'success' &&
      needs.parse.outputs.isDuplicate != 'true' &&
      github.event.label.name == 'Create PR'

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Validate
        run: |
          if [[ "${{ needs.parse.outputs.packageName }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ github.event.label.name }}" != "Create PR" ]]; then
            exit 1
          fi

      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"
      
      - name: Check merge-blocking labels
        uses: ./.github/actions/check-do-not-merge
        with:
          issueNumber: ${{ github.event.issue.number }}
          actionDescription: Create PR

      - name: Check for existing PR
        id: existingPr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          branch="new/${ISSUE}"
          existing_pr=$(gh pr list --repo "$GH_REPO" --head "$branch" --json url -q '.[0].url' || true)
          echo "url=$existing_pr" >> "$GITHUB_OUTPUT"

      - name: Comment if PR already exists
        if: steps.existingPr.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.existingPr.outputs.url }}
        run: |
          gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "A pull request already exists for this submission: ${PR_URL}"

      - name: Resolve submitter source
        if: steps.existingPr.outputs.url == ''
        id: submitterSource
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail
          app_source=$(printf '%s\n' "$ISSUE_BODY" | awk -v header="App Source" '
            $0 == "### " header { found=1; next }
            found && /^### / { exit }
            found && NF { print; exit }
          ')
          app_source="${app_source//$'\r'/}"
          app_source="${app_source#"${app_source%%[![:space:]]*}"}"
          app_source="${app_source%"${app_source##*[![:space:]]}"}"
          if [[ -z "$app_source" || "$app_source" == "_No response_" ]]; then
            app_source="Submission"
          fi
          echo "value=$app_source" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        if: steps.existingPr.outputs.url == ''
        env:
          ISSUE: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          {
            echo "**Agree with these changes? Please add a :+1: reaction to this PR!**"
            echo ""
            echo "A maintainer requested this PR from issue GH-${ISSUE}."
            echo "These entries should be verified manually (or additional entries can be added) before merging."
            echo "This PR adds signatures from stores that matched what the submitter provided, when verification was run."
            echo "See the verification comment on the issue for full details."
            echo ""
            echo "Closes GH-${ISSUE}"
          } > "${RUNNER_TEMP}/prBody.md"

      - name: Checkout repository
        if: steps.existingPr.outputs.url == ''
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download F-Droid results
        if: steps.existingPr.outputs.url == ''
        uses: actions/download-artifact@v8
        with:
          pattern: fdroid-result-*
          merge-multiple: true
          path: fdroid-results

      - name: Check for matching store signatures
        if: steps.existingPr.outputs.url == ''
        id: storeMatches
        env:
          USER_SIG: ${{ needs.parse.outputs.packageSignature }}
          ACC_SIG: ${{ needs.accrescent.outputs.signature }}
          GPLAY_SIG: ${{ needs.gplay.outputs.signature }}
          APKPURE_SIG: ${{ needs.apkpure.outputs.signature }}
          APPVERIFIER_SIG: ${{ needs.appverifierDb.outputs.signature }}
          DIRECT_SIG: ${{ needs.directApk.outputs.signature }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          matched=false
          if [[ -n "$ACC_SIG" ]] && signatures_equal "$ACC_SIG" "$USER_SIG"; then
            matched=true
          fi
          if [[ -n "$GPLAY_SIG" ]] && signatures_equal "$GPLAY_SIG" "$USER_SIG"; then
            matched=true
          fi
          if [[ -n "$APKPURE_SIG" ]] && signatures_equal "$APKPURE_SIG" "$USER_SIG"; then
            matched=true
          fi
          if [[ -n "$APPVERIFIER_SIG" ]] && signatures_equal "$APPVERIFIER_SIG" "$USER_SIG"; then
            matched=true
          fi
          if [[ -n "$DIRECT_SIG" ]] && signatures_equal "$DIRECT_SIG" "$USER_SIG"; then
            matched=true
          fi
          while IFS= read -r result_file; do
            [[ -z "$result_file" ]] && continue
            [[ "$(jq -r '.found' "$result_file")" != "true" ]] && continue
            sig=$(jq -r '.signature' "$result_file")
            if signatures_equal "$sig" "$USER_SIG"; then
              matched=true
            fi
          done < <(find fdroid-results -type f -name '*.json' 2>/dev/null)
          echo "matched=$matched" >> "$GITHUB_OUTPUT"

      - name: Set PR signature mode
        if: steps.existingPr.outputs.url == ''
        id: prSignatureMode
        env:
          MATCHED: ${{ steps.storeMatches.outputs.matched }}
          SUBMITTER_SOURCE: ${{ steps.submitterSource.outputs.value }}
        run: |
          if [[ "$MATCHED" == "true" ]]; then
            echo "submitterSource=" >> "$GITHUB_OUTPUT"
          else
            echo "submitterSource=$SUBMITTER_SOURCE" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve co-authors
        if: steps.existingPr.outputs.url == ''
        id: coauthor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABELER_LOGIN: ${{ github.event.sender.login }}
          LABELER_ID: ${{ github.event.sender.id }}
          SUBMITTER_LOGIN: ${{ github.event.issue.user.login }}
          SUBMITTER_ID: ${{ github.event.issue.user.id }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          trailer=$(submission_resolve_coauthor_trailers \
            "$LABELER_LOGIN" "$LABELER_ID" "$SUBMITTER_LOGIN" "$SUBMITTER_ID")
          gha_write_multiline_output trailer "$trailer"

      - name: Create PR
        id: createPr
        if: steps.existingPr.outputs.url == ''
        uses: ./.github/actions/create-submission-pr
        with:
          packageName: ${{ needs.parse.outputs.packageName }}
          packageSignature: ${{ needs.parse.outputs.packageSignature }}
          issueNumber: ${{ github.event.issue.number }}
          prBodyFile: ${{ runner.temp }}/prBody.md
          coAuthorTrailer: ${{ steps.coauthor.outputs.trailer }}
          accrescentSignature: ${{ needs.accrescent.outputs.signature }}
          fdroidResultsDir: fdroid-results
          gplaySignature: ${{ needs.gplay.outputs.signature }}
          apkpureSignature: ${{ needs.apkpure.outputs.signature }}
          appverifierSignature: ${{ needs.appverifierDb.outputs.signature }}
          directApkSignature: ${{ needs.directApk.outputs.signature }}
          directApkLink: ${{ needs.parse.outputs.apkUrl }}
          directApkSha256: ${{ needs.directApk.outputs.apkSha256 }}
          customFdroidRepoUrl: ${{ needs.parse.outputs.customFdroidRepoUrl }}
          customFdroidApkSha256: ${{ needs.customFdroid.outputs.apkSha256 }}
          accrescentApkSha256: ${{ needs.accrescent.outputs.apkSha256 }}
          gplayApkSha256: ${{ needs.gplay.outputs.apkSha256 }}
          apkpureApkSha256: ${{ needs.apkpure.outputs.apkSha256 }}
          submitterSource: ${{ steps.prSignatureMode.outputs.submitterSource }}

      - name: Comment with PR link
        if: steps.createPr.outputs.prCreated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.createPr.outputs.prUrl }}
        run: |
          gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "Opened pull request: ${PR_URL}"

      - name: Report skipped PR
        if: steps.existingPr.outputs.url == '' && steps.createPr.outputs.skipped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "Could not open a PR: no store signatures matched the submission. Add matching store entries manually, or ensure verification was run with the **Run Checks** label first."

  commitAsIsPrepare:
    name: Commit As-Is (prepare)
    runs-on: ubuntu-latest
    concurrency:
      group: data-yml-writes
      cancel-in-progress: false
      queue: max
    needs: [parse, accrescent, fdroid, customFdroid, gplay, apkpure, appverifierDb, directApk]
    if: |
      always() &&
      !cancelled() &&
      needs.parse.result == 'success' &&
      needs.parse.outputs.isDuplicate != 'true' &&
      github.event.label.name == 'Commit As-Is'

    permissions:
      contents: write
      issues: write

    outputs:
      prepared: ${{ steps.prepare_meta.outputs.prepared }}
      skipped: ${{ steps.prepare_meta.outputs.skipped }}

    steps:
      - name: Validate
        run: |
          if [[ "${{ needs.parse.outputs.packageName }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ github.event.label.name }}" != "Commit As-Is" ]]; then
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Check merge-blocking labels
        uses: ./.github/actions/check-do-not-merge
        with:
          issueNumber: ${{ github.event.issue.number }}
          actionDescription: Commit As-Is

      - name: Download F-Droid results
        uses: actions/download-artifact@v8
        with:
          pattern: fdroid-result-*
          merge-multiple: true
          path: fdroid-results

      - name: Resolve co-authors
        id: coauthor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LABELER_LOGIN: ${{ github.event.sender.login }}
          LABELER_ID: ${{ github.event.sender.id }}
          SUBMITTER_LOGIN: ${{ github.event.issue.user.login }}
          SUBMITTER_ID: ${{ github.event.issue.user.id }}
        run: |
          set -euo pipefail
          source .github/actions/signature-lib/signatures.lib.sh
          trailer=$(submission_resolve_coauthor_trailers \
            "$LABELER_LOGIN" "$LABELER_ID" "$SUBMITTER_LOGIN" "$SUBMITTER_ID")
          gha_write_multiline_output trailer "$trailer"

      - name: Prepare submission data.yml
        id: commit
        uses: ./.github/actions/commit-submission
        with:
          pushToMain: "false"
          packageName: ${{ needs.parse.outputs.packageName }}
          packageSignature: ${{ needs.parse.outputs.packageSignature }}
          issueNumber: ${{ github.event.issue.number }}
          coAuthorTrailer: ${{ steps.coauthor.outputs.trailer }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          accrescentSignature: ${{ needs.accrescent.outputs.signature }}
          fdroidResultsDir: fdroid-results
          gplaySignature: ${{ needs.gplay.outputs.signature }}
          apkpureSignature: ${{ needs.apkpure.outputs.signature }}
          appverifierSignature: ${{ needs.appverifierDb.outputs.signature }}
          directApkSignature: ${{ needs.directApk.outputs.signature }}
          directApkLink: ${{ needs.parse.outputs.apkUrl }}
          directApkSha256: ${{ needs.directApk.outputs.apkSha256 }}
          customFdroidRepoUrl: ${{ needs.parse.outputs.customFdroidRepoUrl }}
          customFdroidApkSha256: ${{ needs.customFdroid.outputs.apkSha256 }}
          accrescentApkSha256: ${{ needs.accrescent.outputs.apkSha256 }}
          gplayApkSha256: ${{ needs.gplay.outputs.apkSha256 }}
          apkpureApkSha256: ${{ needs.apkpure.outputs.apkSha256 }}

      - name: Export prepare metadata
        id: prepare_meta
        if: always()
        run: |
          echo "prepared=${{ steps.commit.outputs.prepared }}" >> "$GITHUB_OUTPUT"
          echo "skipped=${{ steps.commit.outputs.skipped }}" >> "$GITHUB_OUTPUT"

      - name: Upload data.yml for attestation
        if: steps.prepare_meta.outputs.prepared == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: database
          path: data.yml

      - name: Upload commit message
        if: steps.prepare_meta.outputs.prepared == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: submission-commit-msg
          path: submission-commit-msg
          if-no-files-found: error

      - name: Report skipped commit
        if: steps.prepare_meta.outputs.skipped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "Could not commit as-is: no store signatures matched the submission. Run **Run Checks** first, or use **Create PR** to add entries manually."

  commitAsIsAttest:
    name: Commit As-Is (attest)
    needs: commitAsIsPrepare
    if: always() && needs.commitAsIsPrepare.outputs.prepared == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: privacyguides/.github/.github/workflows/sign-artifact.yml@5c41b37a937aab5e50262f3ab672fc9b9438dbf9
    with:
      artifact-name: database
      artifact-path: data.yml

  commitAsIsPush:
    name: Commit As-Is (push)
    runs-on: ubuntu-latest
    concurrency:
      group: data-yml-writes
      cancel-in-progress: false
      queue: max
    needs: [commitAsIsPrepare, commitAsIsAttest, parse]
    if: |
      always() &&
      needs.commitAsIsPrepare.outputs.prepared == 'true' &&
      needs.commitAsIsAttest.result == 'success'

    permissions:
      id-token: write
      contents: write
      issues: write

    outputs:
      committed: ${{ steps.push_meta.outputs.committed }}
      commitSha: ${{ steps.push_meta.outputs.commitSha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download attested data.yml
        uses: actions/download-artifact@v8
        with:
          name: database
          path: .

      - name: Download commit message
        uses: actions/download-artifact@v8
        with:
          name: submission-commit-msg
          path: .

      - name: Push verified commit to main
        id: push
        uses: ./.github/actions/push-submission-commit
        with:
          ref: main

      - name: Export push metadata
        id: push_meta
        if: always()
        run: |
          if [[ -n "${{ steps.push.outputs.commitSha }}" ]]; then
            echo "committed=true" >> "$GITHUB_OUTPUT"
            echo "commitSha=${{ steps.push.outputs.commitSha }}" >> "$GITHUB_OUTPUT"
          else
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "commitSha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on success
        if: steps.push_meta.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          PACKAGE: ${{ needs.parse.outputs.packageName }}
          COMMIT_SHA: ${{ steps.push_meta.outputs.commitSha }}
        run: |
          gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "Committed \`${PACKAGE}\` to \`data.yml\` on \`main\` as submitted (attested before push). Commit: \`${COMMIT_SHA}\`"
