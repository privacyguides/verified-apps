name: Process Submission

on:
  issues:
    types: labeled

concurrency:
  group: ${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  parse:
    name: Parse Submission
    runs-on: ubuntu-latest
    outputs:
      packageName: ${{ steps.setOutputs.outputs.packageName }}
      packageSignature: ${{ steps.setOutputs.outputs.packageSignature }}

    if: ${{ github.event.label.name == 'Unchecked' }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - uses: stefanbuck/github-issue-parser@v3.2.5
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/app-submission.yml

      - name: Print jsonString
        env:
          JSON_STRING: ${{ steps.issue-parser.outputs.jsonString }}
        run: |
          echo "$JSON_STRING"
          echo "${{ github.event.issue.labels }}"

      - name: Set outputs
        id: setOutputs
        env:
          JSON_STRING: ${{ steps.issue-parser.outputs.issueparser_verificationInfo }}
        
        run: |
          input="$JSON_STRING"

          stripped="${input#\`\`\`}"
          stripped="${stripped%\`\`\`}"
          packageName=$(printf '%s\n' "$input" | sed -n '2p')
          packageSignature=$(printf '%s\n' "$input" | sed -n '3p')
          export packageName packageSignature

          echo "Package Name: $packageName"
          echo "Signature: $packageSignature"

          is_valid_package_name() {
            [[ "$1" =~ ^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]+)+$ ]]
          }
          is_valid_sha256_colon() {
            [[ "$1" =~ ^([0-9A-Fa-f]{2}:){31}[0-9A-Fa-f]{2}$ ]]
          }
          errors=0
          if ! is_valid_package_name "$packageName"; then
            echo "Invalid packageName: $packageName" >&2
            errors=1
          fi
          if ! is_valid_sha256_colon "$packageSignature"; then
            echo "Invalid packageSignature: $packageSignature" >&2
            errors=1
          fi
          if (( errors )); then
            exit 1
          fi

          echo "packageName=$packageName" >> "$GITHUB_OUTPUT"
          echo "packageSignature=$packageSignature" >> "$GITHUB_OUTPUT"

  accrescent:
    name: Accrescent
    runs-on: ubuntu-latest
    needs: parse
    continue-on-error: true

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Get App Info From API
        id: appInfo
        uses: ./.github/actions/get-accrescent-app
        with:
          packageName: ${{ env.PACKAGE_NAME }}

      - name: Print App Info
        id: accrescentInfo
        env:
          DOWNLOAD_INFO: ${{ steps.appInfo.outputs.downloadInfo }}
        run: |
          printf '%s\n' "$DOWNLOAD_INFO" | jq .
          firstUrl=$(printf '%s\n' "$DOWNLOAD_INFO" | jq -r '.split_download_info[0].url')
          firstApk=$(basename $firstUrl)
          echo "First URL: $firstUrl"
          echo "APK Basename: $firstApk"
          echo "apkUrl=$firstUrl" >> "$GITHUB_OUTPUT"
          echo "apkName=$firstApk" >> "$GITHUB_OUTPUT"

      - name: Restore APK Cache
        id: apkCache
        uses: actions/cache@v5
        with:
          path: ${{ steps.accrescentInfo.outputs.apkName }}
          key: accrescent-${{ env.PACKAGE_NAME }}-${{ steps.accrescentInfo.outputs.apkName }}

      - name: Download APKs
        if: steps.apkCache.outputs.cache-hit != 'true'
        id: appDownload
        env:
          DOWNLOAD_INFO: ${{ steps.accrescentInfo.outputs.apkUrl }}
        run: |
          wget "$DOWNLOAD_INFO"

      - name: Get (First) APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.accrescentInfo.outputs.apkName }}

      - name: Write Summary
        id: summary
        env: 
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY
      
      - name: Matches User-Provided?
        id: matches
        run: |
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "${{ steps.appSignature.outputs.signature }}" ]]; then
            echo "status=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=:x:" >> $GITHUB_OUTPUT
          fi
          echo "packageName=$PACKAGE_NAME" >> $GITHUB_OUTPUT

  fdroid:
    name: F-Droid
    runs-on: ubuntu-latest
    needs: parse
    continue-on-error: true

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Download fdroidcl
        id: fdroidcl
        env:
          FDROIDCL_VERSION: v0.8.1
        run: |
          FDROIDCL="fdroidcl_${FDROIDCL_VERSION}_linux_amd64"
          export FDROIDCL
          wget "https://github.com/Hoverth/fdroidcl/releases/download/${FDROIDCL_VERSION}/${FDROIDCL}"
          chmod +x $FDROIDCL
          echo "bin=$FDROIDCL" >> "$GITHUB_OUTPUT"

      - name: Restore Repository Cache
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.cache/fdroidcl/cache-gob
          key: fdroidRepo

      - name: Restore APK Cache
        uses: actions/cache@v5
        with:
          path: |
            /home/runner/.cache/fdroidcl/apks
          key: fdroid-${{ env.PACKAGE_NAME }}

      - name: Update Repository
        run: |
          ./${{ steps.fdroidcl.outputs.bin }} update

      - name: Download APK
        id: appDownload
        run: |
          ./${{ steps.fdroidcl.outputs.bin }} download $PACKAGE_NAME
          apkPath=$(./${{ steps.fdroidcl.outputs.bin }} download $PACKAGE_NAME 2>&1 | grep '^APK available in ' | sed 's/^APK available in //')
          echo "$apkPath"
          echo "apkPath=$apkPath" >> "$GITHUB_OUTPUT"

      - name: Get APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: ${{ steps.appDownload.outputs.apkPath }}

      - name: Write Summary
        id: summary
        env: 
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

      - name: Matches User-Provided?
        id: matches
        run: |
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "${{ steps.appSignature.outputs.signature }}" ]]; then
            echo "status=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=:x:" >> $GITHUB_OUTPUT
          fi
          echo "packageName=$PACKAGE_NAME" >> $GITHUB_OUTPUT

  gplay:
    name: Google Play
    runs-on: ubuntu-latest
    needs: parse

    outputs:
      signature: ${{ steps.appSignature.outputs.signature }}
      match: ${{ steps.matches.outputs.status }}
      packageName: ${{ steps.matches.outputs.packageName }}

    env:
      PACKAGE_NAME: ${{ needs.parse.outputs.packageName }}

    steps:
      - name: Download Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: "false"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Download cloudscraper
        run: pip install cloudscraper gpapi

      - name: Download gplay
        uses: actions/checkout@v6
        with:
          repository: alltechdev/gplay-apk-downloader
          persist-credentials: "false"
          path: gplay-apk-downloader

      - name: Restore Play Credentials Cache
        id: authCache
        uses: actions/cache@v5
        with:
          path: /home/runner/.gplay-auth.json
          key: gplayAuth

      - name: Authenticate to Google Play
        if: steps.authCache.outputs.cache-hit != 'true'
        run: ./gplay-apk-downloader/gplay auth

      - name: Show App Info
        run: ./gplay-apk-downloader/gplay info "$PACKAGE_NAME"

      - name: Get App Version
        id: appVersion
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          echo "version=$(./gplay-apk-downloader/gplay check-version net.ivpn.client 2>&1 | grep '^Version Code:' | sed 's/^Version Code: //')" >> $GITHUB_OUTPUT
        
      - name: Restore APK Cache
        id: apkCache
        uses: actions/cache@v5
        with:
          path: gplay-${{ env.PACKAGE_NAME }}.apk
          key: gplay-${{ env.PACKAGE_NAME }}-${{ steps.appVersion.outputs.version }}

      - name: Download APK
        if: steps.apkCache.outputs.cache-hit != 'true'
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python
        run: |
          ./gplay-apk-downloader/gplay download "$PACKAGE_NAME"

      - name: Rename APK
        if: steps.apkCache.outputs.cache-hit != 'true'
        run: |
          download="$(ls -1 *.apk | head -1)"
          mv "$download" "gplay-${PACKAGE_NAME}.apk"
          ls -la

      - name: Get (First) APK Signature
        id: appSignature
        uses: ./.github/actions/get-signature
        with:
          path: gplay-${{ env.PACKAGE_NAME }}.apk

      - name: Matches User-Provided?
        id: matches
        run: |
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "${{ steps.appSignature.outputs.signature }}" ]]; then
            echo "status=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=:x:" >> $GITHUB_OUTPUT
          fi
          echo "packageName=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Write Summary
        id: summary
        env: 
          SIGNATURE: ${{ steps.appSignature.outputs.signature }}
        run: |
          echo "$PACKAGE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "$SIGNATURE" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [parse, accrescent, fdroid, gplay]

    if: always()
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:

      - name: Validate
        run: |
          if [[ "${{ needs.parse.outputs.packageName }}" == "" ]]; then
            exit 1
          fi
          if [[ "${{ needs.parse.outputs.packageSignature }}" == "" ]]; then
            exit 1
          fi
          if [[ ${{ github.event.label.name }} != "Unchecked" ]]; then
            exit 1
          fi

      - name: Create Table
        run: |
          echo "We attempted to check Accrescent, F-Droid, and Google Play for this app. If we found any results, they'll be in the table below:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Matches | Verification |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|"  >> $GITHUB_STEP_SUMMARY
          echo "| User-Provided | :arrow_down: | ${{ needs.parse.outputs.packageName }}<br>${{ needs.parse.outputs.packageSignature }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Accrescent | ${{ needs.accrescent.outputs.match }} | ${{ needs.accrescent.outputs.packageName }}<br>${{ needs.accrescent.outputs.signature }} |" >> $GITHUB_STEP_SUMMARY
          echo "| F-Droid | ${{ needs.fdroid.outputs.match }} | ${{ needs.fdroid.outputs.packageName }}<br>${{ needs.fdroid.outputs.signature }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Play | ${{ needs.gplay.outputs.match }} | ${{ needs.gplay.outputs.packageName }}<br>${{ needs.gplay.outputs.signature }} |" >> $GITHUB_STEP_SUMMARY

      - name: Count Matches
        id: count
        run: |
          i=0
          if [[ "${{ needs.accrescent.outputs.match }}" == ":white_check_mark:" ]]; then
            i=$((i+1))
            echo "$i"
          fi
          if [[ "${{ needs.fdroid.outputs.match }}" == ":white_check_mark:" ]]; then
            i=$((i+1))
            echo "$i"
          fi
          if [[ "${{ needs.gplay.outputs.match }}" == ":white_check_mark:" ]]; then
            i=$((i+1))
            echo "$i"
          fi
          echo "$i"
          echo "matches=$i" >> $GITHUB_OUTPUT

      - name: Add Match Count
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ $MATCHES == 0 ]]; then
            echo "We either weren't able to grab this app from stores, or no stores matched it. Please provide a link to exactly where you downloaded it, thanks!" >> $GITHUB_STEP_SUMMARY
            gh issue edit "$NUMBER" --add-label "Likely Bad" --remove-label "Unchecked"
          else
            echo "${MATCHES}/3 of our sources matched what you provided. Some mismatches between app stores can be normal." >> $GITHUB_STEP_SUMMARY
            gh issue edit "$NUMBER" --add-label "Likely Good" --remove-label "Unchecked"
          fi
        env:
          MATCHES: ${{ steps.count.outputs.matches }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}

      - name: Comment on Issue
        if: steps.count.outputs.matches == '0'
        run: |
          gh issue comment "$NUMBER" --body "$(cat "$GITHUB_STEP_SUMMARY")"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}

      - name: Checkout repository
        if: steps.count.outputs.matches != '0'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        if: steps.count.outputs.matches != '0'
        env:
          PACKAGE: ${{ needs.parse.outputs.packageName }}
          ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ACC_MATCH: ${{ needs.accrescent.outputs.match }}
          ACC_SIG: ${{ needs.accrescent.outputs.signature }}
          FDROID_MATCH: ${{ needs.fdroid.outputs.match }}
          FDROID_SIG: ${{ needs.fdroid.outputs.signature }}
          GPLAY_MATCH: ${{ needs.gplay.outputs.match }}
          GPLAY_SIG: ${{ needs.gplay.outputs.signature }}
        run: |
          set -euo pipefail

          export PACKAGE ISSUE
          entry="$(mktemp)"
          yq -n '.package = strenv(PACKAGE) | .issue = env(ISSUE) | .signature = []' > "$entry"

          if [[ "$ACC_MATCH" == ":white_check_mark:" && -n "$ACC_SIG" ]]; then
            export SIG="$ACC_SIG"
            yq -i '.signature += [{"source": "Accrescent", "fingerprint": strenv(SIG)}]' "$entry"
          fi
          if [[ "$FDROID_MATCH" == ":white_check_mark:" && -n "$FDROID_SIG" ]]; then
            export SIG="$FDROID_SIG"
            yq -i '.signature += [{"source": "F-Droid", "fingerprint": strenv(SIG)}]' "$entry"
          fi
          if [[ "$GPLAY_MATCH" == ":white_check_mark:" && -n "$GPLAY_SIG" ]]; then
            export SIG="$GPLAY_SIG"
            yq -i '.signature += [{"source": "Google Play", "fingerprint": strenv(SIG)}]' "$entry"
          fi

          if [[ "$(yq '.signature | length' "$entry")" -eq 0 ]]; then
            echo "No matching store signatures; skipping PR." >&2
            exit 0
          fi

          if [[ -f data.yml ]]; then
            yq -i '[.[] | select(.package != strenv(PACKAGE))]' data.yml
            export ENTRY="$entry"
            yq -i '. += [load(strenv(ENTRY))]' data.yml
          else
            cp "$entry" data.yml
          fi
          yq -i 'sort_by(.package)' data.yml

          branch="new/${ISSUE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data.yml
          git commit -m "${PACKAGE} (${ISSUE})"
          git push -u origin "$branch"
          
          echo "One or more app stores matched the signature in issue ${ISSUE}, so I've created this PR automatically." >> prBody.md
          echo "These entries should now be verified manually (or additional entries can be added) before merging!" >> prBody.md
          echo "" >> prBody.md
          echo "Closes ${ISSUE}" >> prBody.md
          echo "" >> prBody.md
          echo "---" >> prBody.md
          cat $GITHUB_STEP_SUMMARY >> prBody.md

          gh pr create \
            --repo "$GH_REPO" \
            --title "Add ${PACKAGE}" \
            --body-file prBody.md \
            --head "$branch"
