name: AppVerifier internal database import

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: URL to AppVerifier InternalVerificationInfoDatabase.kt (ignored when use_latest_release is true)
        type: string
        default: https://raw.githubusercontent.com/soupslurpr/AppVerifier/main/app/src/main/kotlin/dev/soupslurpr/appverifier/InternalVerificationInfoDatabase.kt
      use_latest_release:
        description: Download InternalVerificationInfoDatabase.kt from the latest soupslurpr/AppVerifier GitHub release tag
        type: boolean
        default: false
      dry_run:
        description: List missing entries and issues that would be opened, without creating issues
        type: boolean
        default: false
      max_issues:
        description: Maximum issues to create (0 = no limit). Only counts eligible signing configs; skips already-open duplicates.
        type: number
        default: 0

concurrency:
  group: appverifier-import
  cancel-in-progress: false

jobs:
  compareAndFile:
    name: Compare database and open issues
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Resolve AppVerifier database URL
        id: database
        env:
          GH_TOKEN: ${{ github.token }}
          DATABASE_URL: ${{ inputs.database_url }}
          USE_LATEST: ${{ inputs.use_latest_release }}
        run: |
          set -euo pipefail

          if [[ "$USE_LATEST" == "true" ]]; then
            tag=$(gh api repos/soupslurpr/AppVerifier/releases/latest --jq '.tag_name')
            if [[ -z "$tag" ]]; then
              echo "Could not resolve latest AppVerifier release tag." >&2
              exit 1
            fi
            resolved="https://raw.githubusercontent.com/soupslurpr/AppVerifier/${tag}/app/src/main/kotlin/dev/soupslurpr/appverifier/InternalVerificationInfoDatabase.kt"
            echo "url=$resolved" >> "$GITHUB_OUTPUT"
          else
            echo "url=$DATABASE_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Download AppVerifier internal database
        env:
          DATABASE_URL: ${{ steps.database.outputs.url }}
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 -o "${RUNNER_TEMP}/InternalVerificationInfoDatabase.kt" "$DATABASE_URL"

      - name: Install Python dependencies
        run: pip3 install --disable-pip-version-check pyyaml

      - name: Compare against data.yml
        run: |
          set -euo pipefail
          python3 .github/scripts/appverifier_import.py compare \
            --database-file "${RUNNER_TEMP}/InternalVerificationInfoDatabase.kt" \
            --data-yml data.yml \
            --output "${RUNNER_TEMP}/missing-entries.json"

      - name: Summarize missing entries
        run: |
          set -euo pipefail
          count=$(jq 'length' "${RUNNER_TEMP}/missing-entries.json")
          echo "Missing AppVerifier signing configs not yet represented in data.yml: ${count}"
          if [[ "$count" -gt 0 ]]; then
            jq -r '.[] | "\(.package): \(.fingerprints | length) fingerprint(s), sources: \(.sources | join(", "))"' \
              "${RUNNER_TEMP}/missing-entries.json"
          fi

      - name: Ensure tracking label exists
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "Import AppVerifier" \
            --repo "${{ github.repository }}" \
            --color "BFD4F2" \
            --description "Opened automatically from the AppVerifier internal verification database" \
            2>/dev/null || true

      - name: Create submission issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ steps.database.outputs.url }}
          DRY_RUN: ${{ inputs.dry_run }}
          MAX_ISSUES: ${{ inputs.max_issues }}
        run: |
          set -euo pipefail
          args=(
            python3 .github/scripts/appverifier_import.py create-issues
            --missing-file "${RUNNER_TEMP}/missing-entries.json"
            --repo "${{ github.repository }}"
            --database-url "$DATABASE_URL"
            --report "${RUNNER_TEMP}/created-issues.json"
          )
          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi
          args+=(--max-issues "${MAX_ISSUES%.*}")
          "${args[@]}"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appverifier-import-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/missing-entries.json
            ${{ runner.temp }}/created-issues.json
          if-no-files-found: ignore
