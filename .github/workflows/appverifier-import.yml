name: AppVerifier internal database import

on:
  workflow_dispatch:
    inputs:
      database_url:
        description: URL to AppVerifier InternalVerificationInfoDatabase.kt (ignored when use_latest_release is true)
        type: string
        default: https://raw.githubusercontent.com/soupslurpr/AppVerifier/main/app/src/main/kotlin/dev/soupslurpr/appverifier/InternalVerificationInfoDatabase.kt
      use_latest_release:
        description: Download InternalVerificationInfoDatabase.kt from the latest soupslurpr/AppVerifier GitHub release tag
        type: boolean
        default: false
      dry_run:
        description: List missing entries and issues that would be opened, without creating issues
        type: boolean
        default: false
      max_issues:
        description: Maximum issues to create (0 = no limit). Only counts eligible signing configs; skips already-open duplicates.
        type: number
        default: 0

concurrency:
  group: appverifier-import
  cancel-in-progress: false

jobs:
  resolveUrl:
    name: Resolve database URL
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.database.outputs.url }}
    steps:
      - name: Resolve AppVerifier database URL
        id: database
        env:
          GH_TOKEN: ${{ github.token }}
          DATABASE_URL: ${{ inputs.database_url }}
          USE_LATEST: ${{ inputs.use_latest_release }}
        run: |
          set -euo pipefail

          if [[ "$USE_LATEST" == "true" ]]; then
            tag=$(gh api repos/soupslurpr/AppVerifier/releases/latest --jq '.tag_name')
            if [[ -z "$tag" ]]; then
              echo "Could not resolve latest AppVerifier release tag." >&2
              exit 1
            fi
            resolved="https://raw.githubusercontent.com/soupslurpr/AppVerifier/${tag}/app/src/main/kotlin/dev/soupslurpr/appverifier/InternalVerificationInfoDatabase.kt"
            echo "url=$resolved" >> "$GITHUB_OUTPUT"
          else
            echo "url=$DATABASE_URL" >> "$GITHUB_OUTPUT"
          fi

  import:
    name: Compare database and open issues
    needs: resolveUrl
    uses: ./.github/workflows/import-missing-submissions.yml
    secrets: inherit
    with:
      source_url: ${{ needs.resolveUrl.outputs.url }}
      download_filename: InternalVerificationInfoDatabase.kt
      import_script: .github/scripts/appverifier_import.py
      compare_input_flag: --database-file
      create_issues_url_flag: --database-url
      summary_jq: '.[] | "\(.package): \(.fingerprints | length) fingerprint(s), sources: \(.sources | join(", "))"'
      summary_heading: Missing AppVerifier signing configs not yet represented in data.yml
      label_name: Import AppVerifier
      label_color: BFD4F2
      label_description: Opened automatically from the AppVerifier internal verification database
      artifact_prefix: appverifier-import
      dry_run: ${{ inputs.dry_run }}
      max_issues: ${{ inputs.max_issues }}
