name: Attestation cleanup

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: List attestations that would be deleted without deleting them
        type: boolean
        default: true
      max_age_days:
        description: Delete attestations older than this many days (the newest is always kept)
        type: number
        default: 5

concurrency:
  group: attestation-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Prune stale attestations
    runs-on: ubuntu-latest

    permissions:
      contents: read
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history is required: the script discovers attestations by hashing
          # every historical data.yml version (git log --follow). A shallow clone
          # would only expose the current commit, so nothing old is ever found.
          fetch-depth: 0

      - name: Prune stale attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass inputs raw and default in the shell. Do NOT use `&& inputs.x || N`:
          # a max_age_days of 0 is falsy in Actions expressions and would coalesce to N.
          MAX_AGE_DAYS: ${{ inputs.max_age_days }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          # On scheduled runs `inputs` is empty; default to a 5-day live prune.
          MAX_AGE_DAYS="${MAX_AGE_DAYS:-5}"
          DRY_RUN="${DRY_RUN:-false}"

          args=(
            python3 .github/scripts/cleanup_attestations.py
            --org privacyguides
            --repo verified-apps
            --max-age-days "$MAX_AGE_DAYS"
            --report "${RUNNER_TEMP}/attestation-cleanup.json"
            --summary "$GITHUB_STEP_SUMMARY"
          )

          if [[ "$DRY_RUN" == "true" ]]; then
            args+=(--dry-run)
          fi

          "${args[@]}"

      - name: Upload cleanup report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: attestation-cleanup-${{ github.run_id }}
          path: ${{ runner.temp }}/attestation-cleanup.json
          if-no-files-found: ignore
