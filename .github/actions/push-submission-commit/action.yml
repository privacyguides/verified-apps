name: Push prepared submission commit
description: Push staged file(s) with a prepared commit message as an SSH-signed Privacy Guides bot commit
inputs:
  ref:
    description: Branch or ref to push to
    required: true
  messageFile:
    description: Path to the prepared commit message file
    required: false
    default: submission-commit-msg
  files:
    description: Newline-separated list of files to stage and commit
    required: false
    default: data.yml
  sshSigningKey:
    description: SSH private key used for commit signing (from secrets.ACTIONS_SSH_KEY)
    required: true
  force:
    description: Force-push the ref (only when replacing a submission PR branch; never for main)
    required: false
    default: "false"
outputs:
  commitSha:
    description: SHA of the verified commit
    value: ${{ steps.verifiedCommit.outputs.commit }}

runs:
  using: composite
  steps:
    - name: Push verified commit
      id: verifiedCommit
      uses: ./.github/actions/bot-commit
      with:
        ref: ${{ inputs.ref }}
        messageFile: ${{ inputs.messageFile }}
        files: ${{ inputs.files }}
        sshKey: ${{ inputs.sshSigningKey }}
        force: ${{ inputs.force }}
