name: Push prepared submission commit
description: Push staged file(s) with a prepared commit message via verified-bot-commit
inputs:
  ref:
    description: Branch or ref to push to
    required: true
  messageFile:
    description: Path to the prepared commit message file
    required: false
    default: submission-commit-msg
  files:
    description: Newline-separated list of files to stage and commit
    required: false
    default: data.yml
outputs:
  commitSha:
    description: SHA of the verified commit
    value: ${{ steps.verifiedCommit.outputs.commit }}

runs:
  using: composite
  steps:
    - shell: bash
      env:
        FILES: ${{ inputs.files }}
      run: |
        set -euo pipefail
        while IFS= read -r f; do
          [[ -z "$f" ]] && continue
          git add "$f"
        done <<< "$FILES"

    - name: Push verified commit
      id: verifiedCommit
      uses: iarekylew00t/verified-bot-commit@v2
      with:
        ref: ${{ inputs.ref }}
        message-file: ${{ inputs.messageFile }}
        files: ${{ inputs.files }}
        auto-stage: false
