name: Write F-Droid verification result
description: Serialize F-Droid job outputs to JSON and upload as a workflow artifact
inputs:
  repoName:
    description: F-Droid repository display name (artifact key)
    required: true
  artifactName:
    description: Workflow artifact name for upload
    required: true
  found:
    description: Whether the package was found in the repository
    required: true
  signature:
    description: APK certificate fingerprint(s) from get-signature
    required: false
    default: ""
  apkSha256:
    description: APK file SHA-256 from get-signature
    required: false
    default: ""
  match:
    description: Match status emoji from match-signature
    required: false
    default: ""
  packageName:
    description: Package name from match-signature
    required: false
    default: ""
  infoNote:
    description: Optional info note from match-signature
    required: false
    default: ""
  storeSignedMatch:
    description: Store-signed match flag from match-signature
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Write repository result
      shell: bash
      env:
        REPO_NAME: ${{ inputs.repoName }}
        FOUND: ${{ inputs.found }}
        SIGNATURE: ${{ inputs.signature }}
        APK_SHA256: ${{ inputs.apkSha256 }}
        MATCH: ${{ inputs.match }}
        PKG: ${{ inputs.packageName }}
        INFO_NOTE: ${{ inputs.infoNote }}
        STORE_SIGNED: ${{ inputs.storeSignedMatch }}
      run: |
        set -euo pipefail
        mkdir -p fdroid-result
        jq -n \
          --arg repoName "$REPO_NAME" \
          --arg found "$FOUND" \
          --arg signature "$SIGNATURE" \
          --arg apkSha256 "$APK_SHA256" \
          --arg match "$MATCH" \
          --arg packageName "$PKG" \
          --arg infoNote "$INFO_NOTE" \
          --arg storeSignedMatch "$STORE_SIGNED" \
          '{
            repoName: $repoName,
            found: ($found == "true"),
            signature: $signature,
            apkSha256: $apkSha256,
            match: $match,
            packageName: $packageName,
            infoNote: $infoNote,
            storeSignedMatch: ($storeSignedMatch == "true")
          }' > "fdroid-result/${REPO_NAME}.json"

    - name: Upload repository result
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifactName }}
        path: fdroid-result/${{ inputs.repoName }}.json
        if-no-files-found: ignore
