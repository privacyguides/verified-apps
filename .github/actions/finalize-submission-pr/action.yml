name: Finalize submission PR commit
description: Replace a submission PR branch with one verified commit containing the PR data.yml tree
inputs:
  pullRequestNumber:
    description: Pull request number
    required: true
  headRef:
    description: Pull request head branch name
    required: true
  headSha:
    description: Pull request head commit SHA (source of data.yml)
    required: true
  issueNumber:
    description: Linked submission issue number
    required: true
  issueBody:
    description: Full GitHub issue body (for Submission Source parsing)
    required: false
    default: ""
  commitSubject:
    description: First line subject for the git commit (typically the PR title)
    required: true
  coAuthorTrailer:
    description: Co-authored-by trailer(s) for the git commit
    required: true
  author:
    description: 'Commit author identity "Name <email>" (the submission''s submitter)'
    required: false
    default: ""
  sshSigningKey:
    description: SSH private key used for commit signing (from secrets.ACTIONS_SSH_KEY)
    required: false
    default: ""
  pushToBranch:
    description: When false, prepare data.yml and commit message only (no push)
    required: false
    default: "true"
outputs:
  prepared:
    description: Whether data.yml was prepared for commit
    value: ${{ steps.prepare.outputs.prepared }}
  skipped:
    description: Whether finalization was skipped (no data.yml changes)
    value: ${{ steps.prepare.outputs.skipped }}

runs:
  using: composite
  steps:
    - shell: bash
      id: prepare
      env:
        PR_NUMBER: ${{ inputs.pullRequestNumber }}
        HEAD_REF: ${{ inputs.headRef }}
        HEAD_SHA: ${{ inputs.headSha }}
        ISSUE: ${{ inputs.issueNumber }}
        ISSUE_BODY: ${{ inputs.issueBody }}
        COMMIT_SUBJECT: ${{ inputs.commitSubject }}
        CO_AUTHOR_TRAILER: ${{ inputs.coAuthorTrailer }}
        GH_REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        if [[ -z "$ISSUE_BODY" ]]; then
          ISSUE_BODY=$(gh issue view "$ISSUE" --repo "$GH_REPO" --json body -q .body)
        fi

        SUBMISSION_ISSUE_REF=$(signatures_submission_issue_ref "$ISSUE" "$ISSUE_BODY")

        echo "skipped=false" >> "$GITHUB_OUTPUT"
        echo "prepared=false" >> "$GITHUB_OUTPUT"

        git fetch origin main
        git fetch origin "$HEAD_REF"

        if ! git cat-file -e "${HEAD_SHA}:data.yml" 2>/dev/null; then
          echo "Pull request head does not contain data.yml" >&2
          exit 1
        fi

        git show "${HEAD_SHA}:data.yml" > "${RUNNER_TEMP}/submission-data.yml"

        schema=$(yq -r '.schema // 0' "${RUNNER_TEMP}/submission-data.yml")
        if ! signatures_data_schema_supported "$schema"; then
          echo "Unsupported data.yml schema in PR (expected 3 or 4): ${schema}" >&2
          exit 1
        fi

        if git cat-file -e "origin/main:data.yml" 2>/dev/null; then
          git show "origin/main:data.yml" > "${RUNNER_TEMP}/main-data.yml"
          if cmp -s "${RUNNER_TEMP}/main-data.yml" "${RUNNER_TEMP}/submission-data.yml"; then
            echo "PR data.yml matches main; nothing to commit." >&2
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        git checkout -B "$HEAD_REF" origin/main
        cp "${RUNNER_TEMP}/submission-data.yml" data.yml
        git add data.yml

        msg_file="${GITHUB_WORKSPACE}/submission-commit-msg"
        submission_write_commit_message_file \
          "$msg_file" \
          "${COMMIT_SUBJECT} from ${SUBMISSION_ISSUE_REF}" \
          "$ISSUE" \
          "$CO_AUTHOR_TRAILER"

        echo "prepared=true" >> "$GITHUB_OUTPUT"

    - name: Push verified commit to PR branch
      if: steps.prepare.outputs.prepared == 'true' && inputs.pushToBranch == 'true'
      id: verifiedCommit
      uses: ./.github/actions/bot-commit
      with:
        ref: ${{ inputs.headRef }}
        author: ${{ inputs.author }}
        messageFile: submission-commit-msg
        files: |
          data.yml
        sshKey: ${{ inputs.sshSigningKey }}
        force: "true"
