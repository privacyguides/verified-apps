name: Domain verification check
description: Live-check a package's domain (HTTPS assetlinks.json + DNS) and report the submitted key's status
inputs:
  packageName:
    description: Android application ID (its namespace is reversed to derive candidate domains)
    required: true
  packageSignature:
    description: Submitter-provided SHA-256 fingerprint(s) to look up in the record
    required: true
outputs:
  found:
    description: "true when a verification record was located for the package's domain"
    value: ${{ steps.check.outputs.found }}
  method:
    description: Method the authoritative record was found via (https or dns)
    value: ${{ steps.check.outputs.method }}
  domain:
    description: Domain the authoritative record was found on (most specific candidate with a record)
    value: ${{ steps.check.outputs.domain }}
  status:
    description: Submitted key status against the authoritative record (allowed or none)
    value: ${{ steps.check.outputs.status }}
  recordJson:
    description: Normalized authoritative record JSON ({found, method, domain, source, package, allowed})
    value: ${{ steps.check.outputs.recordJson }}
  tableRow:
    description: Markdown table row(s) (| Source | Matches | Verification |), one per record found; records on less specific domains are marked superseded
    value: ${{ steps.check.outputs.tableRow }}
  dnssec:
    description: "DNSSEC status for DNS-method records: true, false, or empty (HTTPS method)"
    value: ${{ steps.check.outputs.dnssec }}

runs:
  using: composite
  steps:
    - shell: bash
      id: check
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        PACKAGE_SIGNATURE: ${{ inputs.packageSignature }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/domains.lib.sh"

        echo "found=false" >> "$GITHUB_OUTPUT"
        echo "method=" >> "$GITHUB_OUTPUT"
        echo "domain=" >> "$GITHUB_OUTPUT"
        echo "status=none" >> "$GITHUB_OUTPUT"
        echo "recordJson=" >> "$GITHUB_OUTPUT"
        echo "tableRow=" >> "$GITHUB_OUTPUT"
        echo "dnssec=" >> "$GITHUB_OUTPUT"

        if ! is_valid_package_name "$PACKAGE_NAME"; then
          echo "Invalid package name, skipping domain check: $PACKAGE_NAME" >&2
          exit 0
        fi

        recs=""
        if ! recs=$(domain_find_records_for_package "$PACKAGE_NAME"); then
          echo "No verification record found for any candidate domain of ${PACKAGE_NAME}."
          exit 0
        fi

        # The most specific domain with a record is authoritative; any records found on
        # less specific (parent) domains are shadowed and only reported in the table.
        rec=$(jq -c '.[0]' <<< "$recs")
        method=$(jq -r '.method' <<< "$rec")
        domain=$(jq -r '.domain' <<< "$rec")
        status=$(domain_key_status "$rec" "$PACKAGE_SIGNATURE")
        echo "Found ${method} verification record on ${domain}; submitted key status: ${status}"
        if [[ "$(jq 'length' <<< "$recs")" -gt 1 ]]; then
          echo "Superseded records also found on: $(jq -r '.[1:] | map(.source) | join(", ")' <<< "$recs")"
        fi

        dnssec=$(jq -r 'if .method == "dns" then (.dnssec | tostring) else "" end' <<< "$rec")

        {
          echo "found=true"
          echo "method=${method}"
          echo "domain=${domain}"
          echo "status=${status}"
          echo "dnssec=${dnssec}"
        } >> "$GITHUB_OUTPUT"
        gha_write_multiline_output recordJson "$rec"
        gha_write_multiline_output tableRow "$(domain_table_rows "$recs" "$PACKAGE_SIGNATURE")"
