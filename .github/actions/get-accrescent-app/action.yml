name: Get App Info From Accrescent Repo
description: Fetch app split download URLs from Accrescent's directory gRPC API
inputs:
  packageName:
    description: App package name
    required: true
outputs:
  downloadInfo:
    description: JSON object with split_download_info (urls and sizes)
    value: ${{ steps.fetch.outputs.downloadInfo }}

runs:
  using: composite
  steps:
    # github.action_path includes "./" when the workflow uses `uses: ./.github/actions/...`;
    # actions/cache rejects paths containing "/./" (see actions/cache#1087).
    - shell: bash
      run: echo "ACTION_PATH=$(cd -- "$GITHUB_ACTION_PATH" && pwd)" >> "$GITHUB_ENV"

    - uses: actions/cache@v5
      id: cache
      with:
        path: |
          ${{ env.ACTION_PATH }}/proto
          ${{ env.ACTION_PATH }}/gen
        key: accrescent-grpc-${{ hashFiles('.github/actions/get-accrescent-app/generate.py') }}
        restore-keys: |
          accrescent-grpc-

    - shell: bash
      id: fetch
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        ACTION_PATH: ${{ env.ACTION_PATH }}
      run: |
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"
        python3 -m pip install --disable-pip-version-check -q -r "$ACTION_PATH/requirements.txt"
        stub="$ACTION_PATH/gen/accrescent/appstore/v1/app_service_pb2_grpc.py"
        if [ ! -f "$stub" ]; then
          python3 "$ACTION_PATH/generate.py"
        fi
        set +e
        download_info="$(python3 "$ACTION_PATH/get_app_download_info.py" "$PACKAGE_NAME")"
        rc=$?
        set -e
        if [[ "$rc" -eq 0 ]]; then
          gha_write_multiline_output downloadInfo "$download_info"
        else
          echo "downloadInfo=" >> "$GITHUB_OUTPUT"
          exit "$rc"
        fi
