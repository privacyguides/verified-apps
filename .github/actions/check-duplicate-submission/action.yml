name: Check duplicate submission
description: Detect if package and fingerprint already exist in data.yml or another open submission issue
inputs:
  packageName:
    description: Android application ID
    required: true
  packageSignature:
    description: One or more colon-separated SHA-256 fingerprints (newline-separated when multiple)
    required: true
  currentIssue:
    description: Issue number for the submission being checked
    required: true
  directApkUrl:
    description: Optional direct APK URL from the submission; skips duplicate detection when set
    required: false
    default: ""
  customFdroidRepoUrl:
    description: Optional custom F-Droid repository URL; skips duplicate detection when set
    required: false
    default: ""
outputs:
  isDuplicate:
    description: Whether a duplicate was found
    value: ${{ steps.check.outputs.isDuplicate }}
  duplicateOf:
    description: Issue number of the existing submission or data.yml entry
    value: ${{ steps.check.outputs.duplicateOf }}

runs:
  using: composite
  steps:
    - shell: bash
      id: check
      env:
        PACKAGE: ${{ inputs.packageName }}
        SIGNATURE: ${{ inputs.packageSignature }}
        CURRENT_ISSUE: ${{ inputs.currentIssue }}
        DIRECT_APK_URL: ${{ inputs.directApkUrl }}
        CUSTOM_FDROID_REPO_URL: ${{ inputs.customFdroidRepoUrl }}
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        echo "isDuplicate=false" >> "$GITHUB_OUTPUT"
        echo "duplicateOf=" >> "$GITHUB_OUTPUT"

        if [[ -n "$DIRECT_APK_URL" || -n "$CUSTOM_FDROID_REPO_URL" ]]; then
          echo "Skipping duplicate check: submission includes a direct APK link and/or custom F-Droid repository." >&2
          exit 0
        fi

        parse_issue_body() {
          local body="$1"
          local block

          block=$(printf '%s\n' "$body" | sed -n '/^### Verification Info$/,$p' | tail -n +2)
          if printf '%s\n' "$block" | grep -q '^```'; then
            block=$(printf '%s\n' "$block" | sed -n '/^```/,/^```/p' | sed '1d;$d')
          fi
          parse_verification_text "$block"
        }

        user_sigs=$(signatures_normalize "$SIGNATURE")
        duplicate_of=""

        if [[ -f data.yml ]] && [[ -s data.yml ]]; then
          schema=$(yq -r '.schema // 0' data.yml)
          if [[ "$schema" != "3" ]]; then
            echo "Unsupported data.yml schema (expected 3): $schema" >&2
            exit 1
          fi
          while IFS= read -r row; do
            [[ -z "$row" ]] && continue
            issue_num=$(printf '%s\n' "$row" | jq -r '.issue')
            stored_fp=$(printf '%s\n' "$row" | jq -r '.fingerprint')
            [[ -z "$issue_num" || "$issue_num" == "null" || -z "$stored_fp" ]] && continue
            if signatures_equal "$user_sigs" "$stored_fp"; then
              if [[ -z "$duplicate_of" || "$issue_num" -lt "$duplicate_of" ]]; then
                duplicate_of="$issue_num"
              fi
            fi
          done < <(
            yq -r '
              .packages[]
              | select(.package == strenv(PACKAGE))
              | .signature[]
              | . as $sig
              | ($sig.fingerprint | split("\n") | join("")) as $fp
              | $sig.sources[]
              | {"issue": .issue, "fingerprint": $fp} | @json
            ' data.yml
          )
        fi

        if [[ -z "$duplicate_of" ]]; then
          while IFS= read -r row; do
            [[ -z "$row" ]] && continue
            issue_num=$(printf '%s\n' "$row" | jq -r .number)
            body=$(printf '%s\n' "$row" | jq -r .body)

            if ! parsed=$(parse_issue_body "$body" 2>/dev/null); then
              continue
            fi
            issue_pkg=$(printf '%s\n' "$parsed" | sed -n '1p')
            issue_sigs=$(printf '%s\n' "$parsed" | tail -n +2)

            if [[ "$issue_pkg" == "$PACKAGE" ]] && signatures_equal "$user_sigs" "$issue_sigs"; then
              if [[ -z "$duplicate_of" || "$issue_num" -lt "$duplicate_of" ]]; then
                duplicate_of="$issue_num"
              fi
            fi
          done < <(
            gh issue list --repo "$GH_REPO" --state open --limit 300 --json number,body,title \
              | jq -c --argjson cur "$CURRENT_ISSUE" \
                '[.[] | select(.title | startswith("[New]:")) | select(.number != $cur)] | .[]'
          )
        fi

        if [[ -n "$duplicate_of" ]]; then
          echo "isDuplicate=true" >> "$GITHUB_OUTPUT"
          echo "duplicateOf=$duplicate_of" >> "$GITHUB_OUTPUT"
        fi
