name: Check duplicate submission
description: Detect if package and fingerprint already exist in data.yml or another open submission issue
inputs:
  packageName:
    description: Android application ID
    required: true
  packageSignature:
    description: One or more colon-separated SHA-256 fingerprints (newline-separated when multiple)
    required: true
  currentIssue:
    description: Issue number for the submission being checked
    required: true
  directApkUrl:
    description: Optional direct APK URL from the submission; only matches candidates with the same APK URL
    required: false
    default: ""
  customFdroidRepoUrl:
    description: Optional custom F-Droid repository URL; only matches candidates with the same repository URL
    required: false
    default: ""
outputs:
  isDuplicate:
    description: Whether a duplicate was found
    value: ${{ steps.check.outputs.isDuplicate }}
  duplicateOf:
    description: Issue number of the existing submission or data.yml entry
    value: ${{ steps.check.outputs.duplicateOf }}

runs:
  using: composite
  steps:
    - shell: bash
      id: check
      env:
        PACKAGE: ${{ inputs.packageName }}
        SIGNATURE: ${{ inputs.packageSignature }}
        CURRENT_ISSUE: ${{ inputs.currentIssue }}
        DIRECT_APK_URL: ${{ inputs.directApkUrl }}
        CUSTOM_FDROID_REPO_URL: ${{ inputs.customFdroidRepoUrl }}
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        echo "isDuplicate=false" >> "$GITHUB_OUTPUT"
        echo "duplicateOf=" >> "$GITHUB_OUTPUT"

        parse_issue_body() {
          parse_verification_text "$(signatures_extract_verification_block "$1")"
        }

        # A candidate is only a duplicate when it shares the submission's download source:
        # when this submission specifies a direct APK URL and/or custom F-Droid repository,
        # the candidate must point at the same URL(s). A submission without either matches on
        # package + fingerprint alone (store-based, original behavior).
        download_source_matches() {
          local cand_link="$1"
          local cand_repo="$2"
          if [[ -n "$DIRECT_APK_URL" && "$cand_link" != "$DIRECT_APK_URL" ]]; then
            return 1
          fi
          if [[ -n "$CUSTOM_FDROID_REPO_URL" && "$cand_repo" != "$CUSTOM_FDROID_REPO_URL" ]]; then
            return 1
          fi
          return 0
        }

        user_sigs=$(signatures_normalize "$SIGNATURE")
        duplicate_of=""

        if [[ -f data.yml ]] && [[ -s data.yml ]]; then
          schema=$(yq -r '.schema // 0' data.yml)
          if ! signatures_data_schema_supported "$schema"; then
            echo "Unsupported data.yml schema (expected 3 or 4): $schema" >&2
            exit 1
          fi
          while IFS= read -r row; do
            [[ -z "$row" ]] && continue
            issue_ref=$(printf '%s\n' "$row" | jq -r '.issue')
            stored_fp=$(printf '%s\n' "$row" | jq -r '.fingerprint')
            stored_link=$(printf '%s\n' "$row" | jq -r '.link')
            stored_repo=$(printf '%s\n' "$row" | jq -r '.repo')
            [[ -z "$issue_ref" || "$issue_ref" == "null" || -z "$stored_fp" ]] && continue
            if ! issue_num=$(signatures_github_issue_number "$issue_ref"); then
              continue
            fi
            if signatures_equal "$user_sigs" "$stored_fp" && download_source_matches "$stored_link" "$stored_repo"; then
              if [[ -z "$duplicate_of" || "$issue_num" -lt "$duplicate_of" ]]; then
                duplicate_of="$issue_num"
              fi
            fi
          done < <(
            yq -r '
              .packages[]
              | select(.package == strenv(PACKAGE))
              | .signature[]
              | .fingerprint as $fp
              | .sources[]
              | {"issue": .issue, "fingerprint": $fp, "link": (.apk.link // ""), "repo": (.apk.repo // "")}
              | @json
            ' data.yml
          )
        fi

        if [[ -z "$duplicate_of" ]]; then
          while IFS= read -r row; do
            [[ -z "$row" ]] && continue
            issue_num=$(printf '%s\n' "$row" | jq -r .number)
            body=$(printf '%s\n' "$row" | jq -r .body)

            if ! parsed=$(parse_issue_body "$body" 2>/dev/null); then
              continue
            fi
            issue_pkg=$(printf '%s\n' "$parsed" | sed -n '1p')
            issue_sigs=$(printf '%s\n' "$parsed" | tail -n +2)
            cand_link=$(signatures_parse_issue_field "Direct APK Link" "$body" true)
            cand_repo=$(signatures_parse_issue_field "Custom F-Droid Repository" "$body" true)

            if [[ "$issue_pkg" == "$PACKAGE" ]] && signatures_equal "$user_sigs" "$issue_sigs" \
              && download_source_matches "$cand_link" "$cand_repo"; then
              if [[ -z "$duplicate_of" || "$issue_num" -lt "$duplicate_of" ]]; then
                duplicate_of="$issue_num"
              fi
            fi
          done < <(
            gh issue list --repo "$GH_REPO" --state open --limit 300 --json number,body,title \
              | jq -c --argjson cur "$CURRENT_ISSUE" \
                '[.[] | select(.title | startswith("[New]:")) | select(.number != $cur)] | .[]'
          )
        fi

        if [[ -n "$duplicate_of" ]]; then
          echo "isDuplicate=true" >> "$GITHUB_OUTPUT"
          echo "duplicateOf=$duplicate_of" >> "$GITHUB_OUTPUT"
        fi
