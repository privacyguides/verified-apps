name: Match APK signature
description: Compare a store signature to the user-provided fingerprint
inputs:
  packageName:
    description: Android application ID
    required: true
  userSignature:
    description: Fingerprint submitted in the issue
    required: true
  storeSignature:
    description: Fingerprint extracted from the store APK
    required: true
  signerKind:
    description: Signer profile from get-signature (google-play-app-signing, fdroid, or empty)
    required: false
    default: ""
outputs:
  status:
    description: Match indicator emoji for the summary table
    value: ${{ steps.match.outputs.status }}
  packageName:
    description: Application ID passed through for job outputs
    value: ${{ steps.match.outputs.packageName }}
  infoNote:
    description: Optional footnote when status is informational
    value: ${{ steps.match.outputs.infoNote }}
  storeSignedMatch:
    description: True when fingerprints match and the store APK uses Play or F-Droid signing
    value: ${{ steps.match.outputs.storeSignedMatch }}

runs:
  using: composite
  steps:
    - shell: bash
      id: match
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        USER_SIG: ${{ inputs.userSignature }}
        STORE_SIG: ${{ inputs.storeSignature }}
        SIGNER_KIND: ${{ inputs.signerKind }}
      run: |
        store_signed_match=false
        store_owned=false
        info_note=""

        if [[ "$SIGNER_KIND" == "google-play-app-signing" && ! "$PACKAGE_NAME" =~ ^com\.google\. ]]; then
          store_owned=true
          play_match_note=":large_blue_diamond: **Google Play:** the fingerprint you submitted matches the certificate signed with **Google Play App Signing**, not a developer-owned key. This is fine, but it will likely never match the signatures found in other stores."
          play_mismatch_note=":warning: **Google Play:** the APK in this store is signed with **Google Play App Signing**, not a developer-owned key."
        elif [[ "$SIGNER_KIND" == "fdroid" && ! "$PACKAGE_NAME" =~ ^org\.fdroid\. ]]; then
          store_owned=true
          fdroid_match_note=":large_blue_diamond: **F-Droid:** the fingerprint you submitted matches the **F-Droid project key**. This is fine, but you should complain to the app's developer to add [reproducible build](https://f-droid.org/docs/Reproducible_Builds/) support."
          fdroid_mismatch_note=":warning: **F-Droid:** the APK in this store is signed by the **F-Droid project key**, which usually means the app has **non-reproducible builds** on F-Droid. You should complain to the app's developer to add [reproducible build](https://f-droid.org/docs/Reproducible_Builds/) support."
        fi

        if [[ "$STORE_SIG" == "$USER_SIG" ]]; then
          if [[ "$store_owned" == true ]]; then
            echo "status=:large_blue_diamond:" >> "$GITHUB_OUTPUT"
            if [[ "$SIGNER_KIND" == "google-play-app-signing" ]]; then
              info_note="$play_match_note"
            else
              info_note="$fdroid_match_note"
            fi
            store_signed_match=true
          else
            echo "status=:white_check_mark:" >> "$GITHUB_OUTPUT"
          fi
        elif [[ "$store_owned" == true ]]; then
          echo "status=:warning:" >> "$GITHUB_OUTPUT"
          if [[ "$SIGNER_KIND" == "google-play-app-signing" ]]; then
            info_note="$play_mismatch_note"
          else
            info_note="$fdroid_mismatch_note"
          fi
        else
          echo "status=:x:" >> "$GITHUB_OUTPUT"
        fi

        if [[ -n "$info_note" ]]; then
          {
            echo 'infoNote<<EOF'
            echo "$info_note"
            echo EOF
          } >> "$GITHUB_OUTPUT"
        else
          echo "infoNote=" >> "$GITHUB_OUTPUT"
        fi

        echo "packageName=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
        echo "storeSignedMatch=$store_signed_match" >> "$GITHUB_OUTPUT"
