name: Download APK with apkeep
description: Download an APK from Google Play or an F-Droid repository using EFF apkeep
inputs:
  packageName:
    description: Android application ID
    required: true
  downloadSource:
    description: apkeep download source (google-play or f-droid)
    required: true
  fDroidRepoURL:
    description: F-Droid repository URL (required when downloadSource is f-droid)
    required: false
    default: ""
  apkeepVersion:
    description: apkeep release version to install from GitHub
    required: false
    default: "1.0.0"
outputs:
  found:
    description: Whether the package could be resolved in the chosen store
    value: ${{ steps.download.outputs.found }}
  apkPath:
    description: Path to the downloaded APK file
    value: ${{ steps.download.outputs.apkPath }}

runs:
  using: composite
  steps:
    - shell: bash
      id: apkeep
      env:
        APKEEP_VERSION: ${{ inputs.apkeepVersion }}
      run: |
        set -euo pipefail
        bin="${RUNNER_TEMP}/apkeep"
        asset="apkeep-x86_64-unknown-linux-gnu"
        url="https://github.com/EFForg/apkeep/releases/download/${APKEEP_VERSION}/${asset}"
        curl -fsSL --retry 3 --retry-delay 2 -o "$bin" "$url"
        chmod +x "$bin"
        echo "bin=$bin" >> "$GITHUB_OUTPUT"

    - shell: bash
      id: cacheKey
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        DOWNLOAD_SOURCE: ${{ inputs.downloadSource }}
        FDROID_REPO_URL: ${{ inputs.fDroidRepoURL }}
      run: |
        set -euo pipefail
        scope="${DOWNLOAD_SOURCE}"
        if [[ "$DOWNLOAD_SOURCE" == "f-droid" ]]; then
          repo_hash=$(printf '%s' "${FDROID_REPO_URL:-https://f-droid.org/repo}" | sha256sum | awk '{print $1}')
          scope="${DOWNLOAD_SOURCE}-${repo_hash}"
        fi
        echo "cacheKey=apkeep-${scope}-${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

    - name: Restore APK cache
      id: apkCache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/apkeep-apk-cache
        key: ${{ steps.cacheKey.outputs.cacheKey }}

    - shell: bash
      id: download
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        DOWNLOAD_SOURCE: ${{ inputs.downloadSource }}
        FDROID_REPO_URL: ${{ inputs.fDroidRepoURL }}
        APKEEP_BIN: ${{ steps.apkeep.outputs.bin }}
        GPLAY_EMAIL: ${{ env.GPLAY_EMAIL }}
        GPLAY_AAS_TOKEN: ${{ env.GPLAY_AAS_TOKEN }}
        CACHE_HIT: ${{ steps.apkCache.outputs.cache-hit }}
      run: |
        set -euo pipefail
        echo "found=false" >> "$GITHUB_OUTPUT"
        echo "apkPath=" >> "$GITHUB_OUTPUT"

        cache_dir="${RUNNER_TEMP}/apkeep-apk-cache"
        mkdir -p "$cache_dir"

        if [[ "$CACHE_HIT" == "true" ]]; then
          apkPath=$(find "$cache_dir" -type f -name '*.apk' | head -n1)
          if [[ -n "$apkPath" && -f "$apkPath" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "apkPath=$apkPath" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        work_dir="${RUNNER_TEMP}/apkeep-download"
        rm -rf "$work_dir"
        mkdir -p "$work_dir"

        apkeep_args=(-a "$PACKAGE_NAME" -d "$DOWNLOAD_SOURCE")

        if [[ "$DOWNLOAD_SOURCE" == "google-play" ]]; then
          if [[ -z "${GPLAY_EMAIL:-}" || -z "${GPLAY_AAS_TOKEN:-}" ]]; then
            echo "GPLAY_EMAIL and GPLAY_AAS_TOKEN must be set for Google Play downloads." >&2
            exit 1
          fi
          apkeep_args+=(-e "$GPLAY_EMAIL" -t "$GPLAY_AAS_TOKEN")
        elif [[ "$DOWNLOAD_SOURCE" == "f-droid" ]]; then
          repo_url="${FDROID_REPO_URL:-https://f-droid.org/repo}"
          apkeep_args+=(-o "repo=${repo_url}")
        else
          echo "Unsupported downloadSource: $DOWNLOAD_SOURCE" >&2
          exit 1
        fi

        download_log="${RUNNER_TEMP}/apkeep-download.log"
        if ! "$APKEEP_BIN" "${apkeep_args[@]}" "$work_dir" >"$download_log" 2>&1; then
          cat "$download_log" >&2 || true
          exit 0
        fi

        apkPath=$(find "$work_dir" -type f -name '*.apk' ! -name '*config*' | head -n1)
        if [[ -z "$apkPath" ]]; then
          apkPath=$(find "$work_dir" -type f -name '*.apk' | head -n1)
        fi
        if [[ -z "$apkPath" || ! -f "$apkPath" ]]; then
          cat "$download_log" >&2 || true
          exit 0
        fi

        rm -f "$cache_dir"/*.apk 2>/dev/null || true
        cp "$apkPath" "$cache_dir/$(basename "$apkPath")"
        apkPath="$cache_dir/$(basename "$apkPath")"

        echo "found=true" >> "$GITHUB_OUTPUT"
        echo "apkPath=$apkPath" >> "$GITHUB_OUTPUT"
