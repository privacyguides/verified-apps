name: Download APK with apkeep
description: Download an APK from Google Play or APKPure using EFF apkeep
inputs:
  packageName:
    description: Android application ID
    required: true
  source:
    description: apkeep download source (google-play or apk-pure)
    required: false
    default: google-play
  apkeepVersion:
    description: apkeep crate version to install with cargo
    required: false
    default: "1.0.0"
outputs:
  found:
    description: Whether the package could be resolved on the chosen source
    value: ${{ steps.download.outputs.found }}
  apkPath:
    description: Path to the downloaded APK file
    value: ${{ steps.download.outputs.apkPath }}

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
        cache-shared-key: apkeep-${{ inputs.apkeepVersion }}

    - shell: bash
      id: apkeep
      env:
        APKEEP_VERSION: ${{ inputs.apkeepVersion }}
      run: |
        set -euo pipefail
        if ! "${HOME}/.cargo/bin/apkeep" --version 2>/dev/null | grep -qF "${APKEEP_VERSION}"; then
          cargo install apkeep --version "${APKEEP_VERSION}" --locked --force
        fi
        apkeep --version
        echo "bin=${HOME}/.cargo/bin/apkeep" >> "$GITHUB_OUTPUT"

    - shell: bash
      id: cacheKey
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        APKEEP_SOURCE: ${{ inputs.source }}
      run: |
        set -euo pipefail
        echo "cacheKey=apkeep-${APKEEP_SOURCE}-${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

    - name: Restore APK cache
      id: apkCache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/apkeep-${{ inputs.source }}-apk-cache
        key: ${{ steps.cacheKey.outputs.cacheKey }}
        restore-keys: |
          apkeep-${{ inputs.source }}-${{ inputs.packageName }}-

    - shell: bash
      id: download
      env:
        PACKAGE_NAME: ${{ inputs.packageName }}
        APKEEP_BIN: ${{ steps.apkeep.outputs.bin }}
        APKEEP_SOURCE: ${{ inputs.source }}
        GPLAY_EMAIL: ${{ env.GPLAY_EMAIL }}
        GPLAY_AAS_TOKEN: ${{ env.GPLAY_AAS_TOKEN }}
        CACHE_HIT: ${{ steps.apkCache.outputs.cache-hit }}
      run: |
        set -euo pipefail
        echo "found=false" >> "$GITHUB_OUTPUT"
        echo "apkPath=" >> "$GITHUB_OUTPUT"

        # Resolve a scannable base APK from a directory. APKPure often ships .xapk
        # bundles; unzip and use the main APK (not split config.*.apk files).
        resolve_scannable_apk() {
          local dir="$1"
          local package="$2"

          if [[ -f "${dir}/${package}.apk" ]]; then
            echo "${dir}/${package}.apk"
            return 0
          fi

          local apk
          apk=$(find "$dir" -maxdepth 1 -type f -name '*.apk' ! -name 'config.*' | head -n1)
          if [[ -n "$apk" && -f "$apk" ]]; then
            echo "$apk"
            return 0
          fi

          local xapk
          xapk=$(find "$dir" -maxdepth 1 -type f -name '*.xapk' | head -n1)
          if [[ -z "$xapk" ]]; then
            xapk=$(find "$dir" -type f -name '*.xapk' | head -n1)
          fi
          if [[ -z "$xapk" || ! -f "$xapk" ]]; then
            return 1
          fi

          local extract_dir="${dir}/.xapk-extract"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          echo "Extracting XAPK bundle: $(basename "$xapk")" >&2
          unzip -q -o "$xapk" -d "$extract_dir"

          if [[ -f "${extract_dir}/${package}.apk" ]]; then
            echo "${extract_dir}/${package}.apk"
            return 0
          fi

          local largest=0 main=""
          while IFS= read -r -d '' candidate; do
            local size
            size=$(stat -c%s "$candidate")
            if (( size > largest )); then
              largest=$size
              main=$candidate
            fi
          done < <(find "$extract_dir" -type f -name '*.apk' ! -name 'config.*' -print0)

          if [[ -n "$main" && -f "$main" ]]; then
            echo "$main"
            return 0
          fi
          return 1
        }

        cache_dir="${RUNNER_TEMP}/apkeep-${APKEEP_SOURCE}-apk-cache"
        mkdir -p "$cache_dir"

        if [[ "$CACHE_HIT" == "true" ]]; then
          if apkPath=$(resolve_scannable_apk "$cache_dir" "$PACKAGE_NAME"); then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "apkPath=$apkPath" >> "$GITHUB_OUTPUT"
            exit 0
          fi
        fi

        work_dir="${RUNNER_TEMP}/apkeep-download"
        rm -rf "$work_dir"
        mkdir -p "$work_dir"
        download_log="${RUNNER_TEMP}/apkeep-download.log"

        case "$APKEEP_SOURCE" in
          google-play)
            if [[ -z "${GPLAY_EMAIL:-}" || -z "${GPLAY_AAS_TOKEN:-}" ]]; then
              echo "GPLAY_EMAIL and GPLAY_AAS_TOKEN must be set for Google Play downloads." >&2
              exit 1
            fi
            if ! "$APKEEP_BIN" -a "$PACKAGE_NAME" -d google-play \
              -e "$GPLAY_EMAIL" -t "$GPLAY_AAS_TOKEN" \
              "$work_dir" >"$download_log" 2>&1; then
              cat "$download_log" >&2 || true
              exit 0
            fi
            ;;
          apk-pure)
            if ! "$APKEEP_BIN" -a "$PACKAGE_NAME" -d apk-pure \
              "$work_dir" >"$download_log" 2>&1; then
              cat "$download_log" >&2 || true
              exit 0
            fi
            ;;
          *)
            echo "Unsupported apkeep source: ${APKEEP_SOURCE}" >&2
            exit 1
            ;;
        esac

        if ! apkPath=$(resolve_scannable_apk "$work_dir" "$PACKAGE_NAME"); then
          cat "$download_log" >&2 || true
          exit 0
        fi

        rm -f "$cache_dir"/*.apk "$cache_dir"/*.xapk 2>/dev/null || true
        cached_apk="${cache_dir}/${PACKAGE_NAME}.apk"
        cp "$apkPath" "$cached_apk"
        apkPath="$cached_apk"

        echo "found=true" >> "$GITHUB_OUTPUT"
        echo "apkPath=$apkPath" >> "$GITHUB_OUTPUT"
