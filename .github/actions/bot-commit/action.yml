name: Bot commit
description: Create an SSH-signed commit from the Privacy Guides bot and push it to a branch
inputs:
  ref:
    description: Branch to push the commit to
    required: true
  author:
    description: 'Commit author identity "Name <email>" (the submission''s submitter)'
    required: true
  messageFile:
    description: Path to the prepared commit message file
    required: true
  files:
    description: Newline-separated list of files to stage before committing
    required: false
    default: ""
  sshKey:
    description: SSH private key used for commit signing (from secrets.ACTIONS_SSH_KEY)
    required: true
  force:
    description: Force-push the ref (only when replacing a submission PR branch; never for main)
    required: false
    default: "false"
outputs:
  commit:
    description: SHA of the created commit
    value: ${{ steps.commit.outputs.commit }}

runs:
  using: composite
  steps:
    - name: Commit and push as Privacy Guides bot
      id: commit
      shell: bash
      env:
        REF: ${{ inputs.ref }}
        AUTHOR: ${{ inputs.author }}
        MESSAGE_FILE: ${{ inputs.messageFile }}
        FILES: ${{ inputs.files }}
        SSH_KEY: ${{ inputs.sshKey }}
        FORCE: ${{ inputs.force }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        key_file=$(submission_configure_git_signing "$SSH_KEY")
        trap 'rm -f "$key_file"' EXIT

        if [[ -n "$FILES" ]]; then
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            [[ -e "$f" ]] && git add "$f"
          done <<< "$FILES"
        fi

        # Authored by the submitter; committed and signed by the Privacy Guides bot above.
        git commit -F "$MESSAGE_FILE" --author="$AUTHOR"

        if [[ "$FORCE" == "true" ]]; then
          git push --force origin "HEAD:${REF}"
        else
          git push origin "HEAD:${REF}"
        fi

        echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
