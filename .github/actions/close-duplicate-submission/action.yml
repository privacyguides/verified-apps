name: Close duplicate submission issue
description: Close the current issue as a duplicate of an existing submission or data.yml entry
inputs:
  duplicateOf:
    description: Issue number of the original submission or data.yml entry
    required: true
  currentIssue:
    description: Issue number being closed
    required: true
  currentAuthor:
    description: Login of the issue author
    required: true
  issueBody:
    description: Full GitHub issue body (fetched when empty, for Codeberg mirroring)
    required: false
    default: ""
  codebergToken:
    description: Codeberg personal access token for mirroring comments
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ inputs.currentIssue }}
        DUPLICATE_OF: ${{ inputs.duplicateOf }}
        CURRENT_AUTHOR: ${{ inputs.currentAuthor }}
        ISSUE_BODY: ${{ inputs.issueBody }}
        CODEBERG_TOKEN: ${{ inputs.codebergToken }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        issue_body="$ISSUE_BODY"
        if [[ -z "$issue_body" ]]; then
          issue_body=$(gh issue view "$NUMBER" --repo "$GH_REPO" --json body -q .body)
        fi

        gh issue edit "$NUMBER" --repo "$GH_REPO" --remove-label "Run Checks" || true
        gh issue edit "$NUMBER" --repo "$GH_REPO" --remove-label "Create PR" || true
        gh issue edit "$NUMBER" --repo "$GH_REPO" --remove-label "Commit As-Is" || true

        if [[ "$DUPLICATE_OF" != "$NUMBER" ]]; then
          original_author=$(gh api "repos/${GH_REPO}/issues/${DUPLICATE_OF}" --jq '.user.login')
          if [[ "$CURRENT_AUTHOR" != "$original_author" ]]; then
            gh issue edit "$DUPLICATE_OF" --repo "$GH_REPO" --add-label "Duplicates Exist"
          fi
        fi

        if [[ "$DUPLICATE_OF" == "$NUMBER" ]]; then
          close_comment="This package and signature are already tracked in an open submission or in data.yml."
          gh issue close "$NUMBER" --repo "$GH_REPO" --comment "$close_comment"
        else
          close_comment="Duplicate of GH-${DUPLICATE_OF}."
          gh issue close "$NUMBER" --repo "$GH_REPO" --duplicate-of "$DUPLICATE_OF"
          # --duplicate-of records a timeline reference but no comment; post one explicitly so
          # the Codeberg mirror (derived from the issue's bot comments) reflects the closure.
          gh issue comment "$NUMBER" --repo "$GH_REPO" --body "$close_comment"
        fi

        # Mirror to the linked Codeberg issue as a single rolling comment (edited in place).
        signatures_mirror_issue_comment_to_codeberg \
          "$CODEBERG_TOKEN" \
          "$NUMBER" \
          "$issue_body"
