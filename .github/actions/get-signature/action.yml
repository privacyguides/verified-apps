name: APK Signature
description: Get signing certificate hash from APK input
inputs:
  path:
    description: Path to APK file
    required: true
outputs:
  signature:
    description: APK certificate fingerprint(s); one line or newline-separated when multiple signers
    value: ${{ steps.analysis.outputs.signature }}
  certificateDn:
    description: Distinguished name of the first app signing certificate
    value: ${{ steps.analysis.outputs.certificateDn }}
  signerKind:
    description: Known signer profile (google-play-app-signing, fdroid, or empty)
    value: ${{ steps.analysis.outputs.signerKind }}
  apkSha256:
    description: Lowercase hex SHA-256 of the APK file bytes
    value: ${{ steps.analysis.outputs.apkSha256 }}

runs:
  using: composite
  steps:
    - shell: bash
      id: analysis
      env:
        APK_PATH: ${{ inputs.path }}
        GOOGLE_PLAY_APP_SIGNING_DN: "CN=Android, OU=Android, O=Google Inc., L=Mountain View, ST=California, C=US"
        FDROID_SIGNER_DN: "CN=FDroid, OU=FDroid, O=fdroid.org, L=ORG, ST=ORG, C=UK"
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
        if [[ -z "$sdk_root" ]]; then
          echo "ANDROID_SDK_ROOT is not set" >&2
          exit 1
        fi

        apksigner=$(find "$sdk_root/build-tools" -maxdepth 2 -name apksigner -type f 2>/dev/null | sort -V | tail -1)
        if [[ -z "$apksigner" || ! -x "$apksigner" ]]; then
          echo "apksigner not found under $sdk_root/build-tools" >&2
          exit 1
        fi

        verification=$("$apksigner" verify --print-certs "$APK_PATH" 2>&1) || true

        cert_dn=$(echo "$verification" | awk '
          /^Source Stamp Signer/ { next }
          /certificate DN:/ {
            sub(/^.*certificate DN: /, "")
            print
            exit
          }
        ')

        mapfile -t sha256_lines < <(echo "$verification" | awk '
          /^Source Stamp Signer/ { next }
          /public key SHA-256 digest/ { next }
          /certificate SHA-256 digest:/ {
            sub(/^.*certificate SHA-256 digest: /, "")
            print
          }
        ')

        if [[ ${#sha256_lines[@]} -eq 0 ]]; then
          echo "$verification" >&2
          echo "Failed to extract app signer certificate SHA-256 digest from apksigner output" >&2
          exit 1
        fi

        raw_formatted=""
        for sha256 in "${sha256_lines[@]}"; do
          fp=$(printf '%s' "$sha256" | tr '[:lower:]' '[:upper:]' | sed -E 's/(..)/\1:/g; s/:$//')
          raw_formatted+="${fp}"$'\n'
        done
        formatted_block=$(signatures_format_block "$raw_formatted")

        signer_kind=""
        while IFS= read -r dn; do
          [[ -z "$dn" ]] && continue
          if [[ "$dn" == "$GOOGLE_PLAY_APP_SIGNING_DN" ]]; then
            signer_kind="google-play-app-signing"
            break
          fi
          if [[ "$dn" == "$FDROID_SIGNER_DN" ]]; then
            signer_kind="fdroid"
            break
          fi
        done < <(echo "$verification" | awk '
          /^Source Stamp Signer/ { next }
          /certificate DN:/ {
            sub(/^.*certificate DN: /, "")
            print
          }
        ')

        echo "---"
        echo "Certificate DN: ${cert_dn:-unknown}"
        echo "SHA-256 digest(s):"
        printf '%s\n' "$formatted_block"
        apk_sha256=$(sha256sum "$APK_PATH" | awk '{print $1}')
        gha_write_multiline_output signature "$formatted_block"
        echo "certificateDn=$cert_dn" >> "$GITHUB_OUTPUT"
        echo "signerKind=$signer_kind" >> "$GITHUB_OUTPUT"
        echo "apkSha256=$apk_sha256" >> "$GITHUB_OUTPUT"
