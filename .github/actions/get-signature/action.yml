name: APK Signature
description: Get signing certificate hash from APK input
inputs:
  path:
    description: Path to APK file
    required: true
  packageName:
    description: Expected Android application ID; must match the APK manifest package from aapt dump badging
    required: true
outputs:
  apkPackageName:
    description: Application ID read from the APK via aapt dump badging
    value: ${{ steps.analysis.outputs.apkPackageName }}
  signature:
    description: APK certificate fingerprint(s); one line or newline-separated when multiple
    value: ${{ steps.analysis.outputs.signature }}
  certificateDn:
    description: Distinguished name of the first app signing certificate
    value: ${{ steps.analysis.outputs.certificateDn }}
  signerKind:
    description: Known signer profile (google-play-app-signing, fdroid, or empty)
    value: ${{ steps.analysis.outputs.signerKind }}
  apkSha256:
    description: Lowercase hex SHA-256 of the APK file bytes
    value: ${{ steps.analysis.outputs.apkSha256 }}

runs:
  using: composite
  steps:
    - shell: bash
      id: analysis
      env:
        APK_PATH: ${{ inputs.path }}
        PACKAGE_NAME: ${{ inputs.packageName }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
        if [[ -z "$sdk_root" ]]; then
          echo "ANDROID_SDK_ROOT is not set" >&2
          exit 1
        fi

        apk_package=$(signatures_verify_apk_package "$PACKAGE_NAME" "$APK_PATH" "$sdk_root")
        echo "apkPackageName=$apk_package" >> "$GITHUB_OUTPUT"
        echo "APK package: $apk_package" >&2

        apksigner=$(signatures_find_android_sdk_tool apksigner "$sdk_root") || {
          echo "apksigner not found under $sdk_root/build-tools" >&2
          exit 1
        }

        verify_out=$("$apksigner" verify --verbose --print-certs "$APK_PATH" 2>&1) || true
        lineage_out=$("$apksigner" lineage --in "$APK_PATH" --print-certs 2>&1) || true
        combined_verification="${verify_out}"$'\n'"${lineage_out}"

        formatted_block=$(signatures_extract_from_apk "$APK_PATH" "$sdk_root") || exit 1
        cert_dn=$(signatures_first_certificate_dn_from_verification "$combined_verification")
        signer_kind=$(signatures_detect_signer_kind_from_verification "$combined_verification")

        echo "---"
        echo "Certificate DN: ${cert_dn:-unknown}"
        echo "SHA-256 digest(s):"
        printf '%s\n' "$formatted_block"

        apk_sha256=$(sha256sum "$APK_PATH" | awk '{print $1}')
        gha_write_multiline_output signature "$formatted_block"
        echo "certificateDn=${cert_dn:-}" >> "$GITHUB_OUTPUT"
        echo "signerKind=${signer_kind:-}" >> "$GITHUB_OUTPUT"
        echo "apkSha256=$apk_sha256" >> "$GITHUB_OUTPUT"
