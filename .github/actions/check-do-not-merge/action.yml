name: Check merge-blocking labels
description: Fail when the submission issue or pull request has Do Not Merge or Needs a +1
inputs:
  issueNumber:
    description: Submission issue number
    required: false
    default: ""
  pullRequestNumber:
    description: Pull request number
    required: false
    default: ""
  actionDescription:
    description: Short description of the blocked action (e.g. "Create PR")
    required: false
    default: "this workflow"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        ISSUE_NUMBER: ${{ inputs.issueNumber }}
        PR_NUMBER: ${{ inputs.pullRequestNumber }}
        ACTION: ${{ inputs.actionDescription }}
      run: |
        set -euo pipefail

        if [[ -z "$ISSUE_NUMBER" && -z "$PR_NUMBER" ]]; then
          echo "At least one of issueNumber or pullRequestNumber is required." >&2
          exit 1
        fi

        blocked_label=""
        blocked_on=""

        if [[ -n "$ISSUE_NUMBER" ]]; then
          labels=$(gh issue view "$ISSUE_NUMBER" --repo "$GH_REPO" --json labels -q '.labels[].name')
          if printf '%s\n' "$labels" | grep -qxF 'Do Not Merge'; then
            blocked_label="Do Not Merge"
            blocked_on="issue GH-${ISSUE_NUMBER}"
          elif printf '%s\n' "$labels" | grep -qxF 'Needs a +1'; then
            blocked_label="Needs a +1"
            blocked_on="issue GH-${ISSUE_NUMBER}"
          fi
        fi

        if [[ -z "$blocked_label" && -n "$PR_NUMBER" ]]; then
          labels=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json labels -q '.labels[].name')
          if printf '%s\n' "$labels" | grep -qxF 'Do Not Merge'; then
            blocked_label="Do Not Merge"
            blocked_on="pull request GH-${PR_NUMBER}"
          elif printf '%s\n' "$labels" | grep -qxF 'Needs a +1'; then
            blocked_label="Needs a +1"
            blocked_on="pull request GH-${PR_NUMBER}"
          fi
        fi

        if [[ -n "$blocked_label" ]]; then
          body="Cannot run **${ACTION}**: ${blocked_on} has the **${blocked_label}** label. Remove that label before retrying."
          if [[ -n "$PR_NUMBER" ]]; then
            gh pr comment "$PR_NUMBER" --repo "$GH_REPO" --body "$body"
          fi
          if [[ -n "$ISSUE_NUMBER" ]]; then
            gh issue comment "$ISSUE_NUMBER" --repo "$GH_REPO" --body "$body"
          fi
          echo "::error::${blocked_on} has the ${blocked_label} label; refusing to proceed."
          exit 1
        fi
