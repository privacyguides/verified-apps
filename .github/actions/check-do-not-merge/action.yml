name: Check merge-blocking labels
description: Fail when the submission issue has Do Not Merge or Needs a +1
inputs:
  issueNumber:
    description: Submission issue number
    required: true
  actionDescription:
    description: Short description of the blocked action (e.g. "Create PR")
    required: false
    default: "this workflow"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        NUMBER: ${{ inputs.issueNumber }}
        ACTION: ${{ inputs.actionDescription }}
      run: |
        set -euo pipefail

        labels=$(gh issue view "$NUMBER" --repo "$GH_REPO" --json labels -q '.labels[].name')

        blocked=""
        if printf '%s\n' "$labels" | grep -qxF 'Do Not Merge'; then
          blocked="Do Not Merge"
        elif printf '%s\n' "$labels" | grep -qxF 'Needs a +1'; then
          blocked="Needs a +1"
        fi

        if [[ -n "$blocked" ]]; then
          gh issue comment "$NUMBER" --repo "$GH_REPO" \
            --body "Cannot run **${ACTION}**: this issue has the **${blocked}** label. Remove that label before retrying."
          echo "::error::Issue #${NUMBER} has the ${blocked} label; refusing to proceed."
          exit 1
        fi
