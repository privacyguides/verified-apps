name: Commit submission to main
description: Merge store-matched signatures into data.yml and push to the default branch
inputs:
  packageName:
    description: Android application ID
    required: true
  packageSignature:
    description: Submitter-provided SHA-256 fingerprint(s)
    required: true
  issueNumber:
    description: Submission issue number
    required: true
  coAuthorTrailer:
    description: Co-authored-by trailer for the git commit (e.g. from the user who added the label)
    required: true
  accrescentSignature:
    description: Fingerprint(s) from Accrescent
    required: false
    default: ""
  fdroidResultsDir:
    description: Directory of per-repo F-Droid result JSON files
    required: false
    default: ""
  gplaySignature:
    description: Fingerprint(s) from Google Play
    required: false
    default: ""
  appverifierSignature:
    description: Fingerprint(s) from AppVerifier internal database
    required: false
    default: ""
  directApkSignature:
    description: Fingerprint(s) from direct APK download
    required: false
    default: ""
outputs:
  committed:
    description: Whether data.yml was updated on main
    value: ${{ steps.commit.outputs.committed }}
  skipped:
    description: Whether commit was skipped (no matching store signatures)
    value: ${{ steps.commit.outputs.skipped }}

runs:
  using: composite
  steps:
    - shell: bash
      id: commit
      env:
        PACKAGE: ${{ inputs.packageName }}
        USER_SIG: ${{ inputs.packageSignature }}
        ISSUE: ${{ inputs.issueNumber }}
        CO_AUTHOR_TRAILER: ${{ inputs.coAuthorTrailer }}
        ACC_SIG: ${{ inputs.accrescentSignature }}
        FDROID_RESULTS_DIR: ${{ inputs.fdroidResultsDir }}
        GPLAY_SIG: ${{ inputs.gplaySignature }}
        APPVERIFIER_SIG: ${{ inputs.appverifierSignature }}
        DIRECT_SIG: ${{ inputs.directApkSignature }}
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        echo "committed=false" >> "$GITHUB_OUTPUT"
        echo "skipped=false" >> "$GITHUB_OUTPUT"

        entry="$(mktemp)"
        if ! submission_build_entry_file "$entry"; then
          echo "No store matched the user-provided signature(s); skipping commit." >&2
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          rm -f "$entry"
          exit 0
        fi

        submission_merge_entry_into_data_yml "$entry"
        rm -f "$entry"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data.yml
        commit_args=(-m "Add ${PACKAGE} from #${ISSUE}")
        if [[ -n "$CO_AUTHOR_TRAILER" ]]; then
          commit_args+=(-m "$CO_AUTHOR_TRAILER")
        fi
        git commit "${commit_args[@]}"
        git push origin HEAD

        echo "committed=true" >> "$GITHUB_OUTPUT"
