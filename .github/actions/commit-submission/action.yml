name: Commit submission to main
description: Merge store-matched signatures into data.yml and push a verified commit to main
inputs:
  packageName:
    description: Android application ID
    required: true
  packageSignature:
    description: Submitter-provided SHA-256 fingerprint(s)
    required: true
  issueNumber:
    description: Submission issue number
    required: true
  issueBody:
    description: Full GitHub issue body (for Submission Source parsing)
    required: false
    default: ""
  coAuthorTrailer:
    description: Co-authored-by trailer(s) for the git commit (labeler and issue author when different)
    required: true
  githubToken:
    description: GitHub PAT
    required: true
  accrescentSignature:
    description: Fingerprint(s) from Accrescent
    required: false
    default: ""
  fdroidResultsDir:
    description: Directory of per-repo F-Droid result JSON files
    required: false
    default: ""
  gplaySignature:
    description: Fingerprint(s) from Google Play
    required: false
    default: ""
  appverifierSignature:
    description: Fingerprint(s) from the matched AppVerifier signing configuration
    required: false
    default: ""
  directApkSignature:
    description: Fingerprint(s) from direct APK download
    required: false
    default: ""
  directApkLink:
    description: Link to the direct APK that was downloaded (when applicable)
    required: false
    default: ""
  directApkSha256:
    description: SHA-256 of the direct APK file bytes (when applicable)
    required: false
    default: ""
  customFdroidRepoUrl:
    description: Link to the custom F-Droid repository URL (when applicable)
    required: false
    default: ""
  customFdroidApkSha256:
    description: SHA-256 of the APK from the custom F-Droid repository (when applicable)
    required: false
    default: ""
  accrescentApkSha256:
    description: SHA-256 of the Accrescent APK (when applicable)
    required: false
    default: ""
  gplayApkSha256:
    description: SHA-256 of the Google Play APK (when applicable)
    required: false
    default: ""
  apkpureSignature:
    description: Fingerprint(s) from APKPure
    required: false
    default: ""
  apkpureApkSha256:
    description: SHA-256 of the APKPure APK (when applicable)
    required: false
    default: ""
  pushToMain:
    description: When false, prepare data.yml and commit message only (no push)
    required: false
    default: "true"
  domainVerifiedSig:
    description: Submitter signature when it is allowed by the package's verified domain (adds a Verified Domain source)
    required: false
    default: ""
  domain:
    description: Verified domain to record in data-verified-domains.yml (when domainVerifiedSig is set)
    required: false
    default: ""
  domainMethod:
    description: Method the verification record was found via (https or dns)
    required: false
    default: ""
outputs:
  prepared:
    description: Whether data.yml was prepared for commit
    value: ${{ steps.prepare.outputs.prepared }}
  domainFileChanged:
    description: Whether data-verified-domains.yml was changed and staged
    value: ${{ steps.prepare.outputs.domainFileChanged }}
  committed:
    description: Whether data.yml was pushed to main
    value: ${{ steps.verifiedCommit.outputs.commit != '' }}
  skipped:
    description: Whether commit was skipped (no matching store signatures)
    value: ${{ steps.prepare.outputs.skipped }}
  commitSha:
    description: SHA of the verified commit on main (empty when not pushed)
    value: ${{ steps.verifiedCommit.outputs.commit }}

runs:
  using: composite
  steps:
    - shell: bash
      id: prepare
      env:
        PACKAGE: ${{ inputs.packageName }}
        USER_SIG: ${{ inputs.packageSignature }}
        ISSUE: ${{ inputs.issueNumber }}
        ISSUE_BODY: ${{ inputs.issueBody }}
        CO_AUTHOR_TRAILER: ${{ inputs.coAuthorTrailer }}
        ACC_SIG: ${{ inputs.accrescentSignature }}
        FDROID_RESULTS_DIR: ${{ inputs.fdroidResultsDir }}
        GPLAY_SIG: ${{ inputs.gplaySignature }}
        APPVERIFIER_SIG: ${{ inputs.appverifierSignature }}
        DIRECT_SIG: ${{ inputs.directApkSignature }}
        DIRECT_APK_URL: ${{ inputs.directApkLink }}
        DIRECT_APK_SHA256: ${{ inputs.directApkSha256 }}
        CUSTOM_FDROID_REPO_URL: ${{ inputs.customFdroidRepoUrl }}
        CUSTOM_FDROID_APK_SHA256: ${{ inputs.customFdroidApkSha256 }}
        ACC_APK_SHA256: ${{ inputs.accrescentApkSha256 }}
        GPLAY_APK_SHA256: ${{ inputs.gplayApkSha256 }}
        APKPURE_SIG: ${{ inputs.apkpureSignature }}
        APKPURE_APK_SHA256: ${{ inputs.apkpureApkSha256 }}
        PUSH_TO_MAIN: ${{ inputs.pushToMain }}
        DOMAIN_VERIFIED_SIG: ${{ inputs.domainVerifiedSig }}
        DV_DOMAIN: ${{ inputs.domain }}
        DV_METHOD: ${{ inputs.domainMethod }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"
        source "${GITHUB_ACTION_PATH}/../domain-verify/domains.lib.sh"

        echo "prepared=false" >> "$GITHUB_OUTPUT"
        echo "skipped=false" >> "$GITHUB_OUTPUT"
        echo "domainFileChanged=false" >> "$GITHUB_OUTPUT"

        SUBMISSION_ISSUE_REF=$(signatures_submission_issue_ref "$ISSUE" "$ISSUE_BODY")
        export SUBMISSION_ISSUE_REF

        entry="$(mktemp)"
        if ! submission_build_entry_file "$entry"; then
          echo "No store matched the user-provided signature(s); skipping commit." >&2
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          rm -f "$entry"
          exit 0
        fi

        submission_merge_entry_into_data_yml "$entry"
        rm -f "$entry"

        # Record the domain in data-verified-domains.yml when the submitted key is allowed by it.
        if [[ -n "${DOMAIN_VERIFIED_SIG:-}" && -n "${DV_DOMAIN:-}" ]]; then
          checked=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          domain_verified_upsert "$DOMAIN_VERIFIED_FILE" "$DV_DOMAIN" "${DV_METHOD:-https}" "$SUBMISSION_ISSUE_REF" "$checked"
          if ! git diff --quiet -- "$DOMAIN_VERIFIED_FILE"; then
            git add "$DOMAIN_VERIFIED_FILE"
            echo "domainFileChanged=true" >> "$GITHUB_OUTPUT"
          fi
        fi

        msg_file="${GITHUB_WORKSPACE}/submission-commit-msg"
        submission_write_commit_message_file \
          "$msg_file" \
          "Add ${PACKAGE} from ${SUBMISSION_ISSUE_REF}" \
          "$ISSUE" \
          "$CO_AUTHOR_TRAILER"

        git add data.yml
        echo "prepared=true" >> "$GITHUB_OUTPUT"

    - name: Push verified commit to main
      if: steps.prepare.outputs.prepared == 'true' && inputs.pushToMain == 'true'
      id: verifiedCommit
      uses: iarekylew00t/verified-bot-commit@v2
      with:
        ref: main
        message-file: submission-commit-msg
        files: |
          data.yml
        auto-stage: false
