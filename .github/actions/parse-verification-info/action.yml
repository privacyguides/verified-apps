name: Parse verification info
description: Extract package name and fingerprint from AppVerifier verification text or an issue body
inputs:
  verificationInfo:
    description: Raw verification info from the issue form parser
    required: false
    default: ""
  issueBody:
    description: Full GitHub issue body (uses the Verification Info section)
    required: false
    default: ""
outputs:
  packageName:
    description: Android application ID
    value: ${{ steps.parse.outputs.packageName }}
  packageSignature:
    description: Colon-separated SHA-256 certificate fingerprint
    value: ${{ steps.parse.outputs.packageSignature }}
  apkUrl:
    description: Optional direct HTTPS link to an APK from the issue form
    value: ${{ steps.parse.outputs.apkUrl }}

runs:
  using: composite
  steps:
    - shell: bash
      id: parse
      env:
        VERIFICATION_INFO: ${{ inputs.verificationInfo }}
        ISSUE_BODY: ${{ inputs.issueBody }}
      run: |
        set -euo pipefail

        is_valid_package_name() {
          [[ "$1" =~ ^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]+)+$ ]]
        }

        is_valid_sha256_colon() {
          [[ "$1" =~ ^([0-9A-Fa-f]{2}:){31}[0-9A-Fa-f]{2}$ ]]
        }

        parse_verification_text() {
          local text="$1"
          local line pkg="" sig=""

          while IFS= read -r line || [[ -n "$line" ]]; do
            line="${line//$'\r'/}"
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^\`\`\` ]] && continue

            if is_valid_package_name "$line" && [[ -z "$pkg" ]]; then
              pkg="$line"
            elif is_valid_sha256_colon "$line" && [[ -z "$sig" ]]; then
              sig=$(printf '%s' "$line" | tr '[:lower:]' '[:upper:]')
            fi
          done <<< "$text"

          if [[ -z "$pkg" || -z "$sig" ]]; then
            return 1
          fi
          printf '%s\n%s\n' "$pkg" "$sig"
        }

        text=""
        if [[ -n "$ISSUE_BODY" ]]; then
          text=$(printf '%s\n' "$ISSUE_BODY" | sed -n '/^### Verification Info$/,$p' | tail -n +2)
          if printf '%s\n' "$text" | grep -q '^```'; then
            text=$(printf '%s\n' "$text" | sed -n '/^```/,/^```/p' | sed '1d;$d')
          fi
        elif [[ -n "$VERIFICATION_INFO" ]]; then
          text="$VERIFICATION_INFO"
        else
          echo "Either verificationInfo or issueBody is required" >&2
          exit 1
        fi

        parse_issue_field() {
          local header="$1"
          local body="$2"
          local value

          value=$(printf '%s\n' "$body" | awk -v header="$header" '
            $0 == "### " header { found=1; next }
            found && /^### / { exit }
            found && NF { print; exit }
          ')
          value="${value//$'\r'/}"
          value="${value#"${value%%[![:space:]]*}"}"
          value="${value%"${value##*[![:space:]]}"}"

          if [[ -z "$value" || "$value" == "_No response_" ]]; then
            return 1
          fi
          printf '%s\n' "$value"
        }

        if ! parsed=$(parse_verification_text "$text"); then
          echo "Could not parse package name and fingerprint from Verification Info. Paste the exact AppVerifier output (package ID and SHA-256 fingerprint on separate lines)." >&2
          exit 1
        fi
        packageName=$(printf '%s\n' "$parsed" | sed -n '1p')
        packageSignature=$(printf '%s\n' "$parsed" | sed -n '2p')

        validate_apk_url() {
          local url="$1"
          [[ -z "$url" ]] && return 1
          if [[ ! "$url" =~ ^https:// ]]; then
            echo "Ignoring Direct APK Link (not an https:// URL): $url" >&2
            return 1
          fi
          if [[ ! "$url" =~ \.apk([?#].*)?$ ]]; then
            echo "Ignoring Direct APK Link (not a direct .apk file; store pages and listings are not supported): $url" >&2
            return 1
          fi
          printf '%s\n' "$url"
        }

        apk_url=""
        if [[ -n "$ISSUE_BODY" ]]; then
          raw_apk_url=$(parse_issue_field "Direct APK Link" "$ISSUE_BODY" || true)
          apk_url=$(validate_apk_url "$raw_apk_url" || true)
        fi

        echo "packageName=$packageName" >> "$GITHUB_OUTPUT"
        echo "packageSignature=$packageSignature" >> "$GITHUB_OUTPUT"
        echo "apkUrl=$apk_url" >> "$GITHUB_OUTPUT"
