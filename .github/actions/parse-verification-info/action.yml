name: Parse verification info
description: Extract package name and fingerprint from AppVerifier verification text or an issue body
inputs:
  verificationInfo:
    description: Raw verification info from the issue form parser
    required: false
    default: ""
  issueBody:
    description: Full GitHub issue body (uses the Verification Info section)
    required: false
    default: ""
  issueNumber:
    description: GitHub issue number (required with issueBody for submission source parsing)
    required: false
    default: ""
outputs:
  packageName:
    description: Android application ID
    value: ${{ steps.parse.outputs.packageName }}
  packageSignature:
    description: One or more colon-separated SHA-256 fingerprints (newline-separated when multiple)
    value: ${{ steps.parse.outputs.packageSignature }}
  apkUrl:
    description: Optional direct HTTPS link to an APK from the issue form
    value: ${{ steps.parse.outputs.apkUrl }}
  customFdroidRepoUrl:
    description: Optional HTTPS URL to a custom F-Droid repository from the issue form
    value: ${{ steps.parse.outputs.customFdroidRepoUrl }}
  submissionIssueRef:
    description: Tracker-prefixed submission reference (CB-N or GH-N)
    value: ${{ steps.parse.outputs.submissionIssueRef }}

runs:
  using: composite
  steps:
    - shell: bash
      id: parse
      env:
        VERIFICATION_INFO: ${{ inputs.verificationInfo }}
        ISSUE_BODY: ${{ inputs.issueBody }}
        ISSUE_NUMBER: ${{ inputs.issueNumber }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        text=""
        if [[ -n "$ISSUE_BODY" ]]; then
          text=$(signatures_extract_verification_block "$ISSUE_BODY")
        elif [[ -n "$VERIFICATION_INFO" ]]; then
          text="$VERIFICATION_INFO"
        else
          echo "Either verificationInfo or issueBody is required" >&2
          exit 1
        fi

        if ! parsed=$(parse_verification_text "$text"); then
          echo "Could not parse package name and fingerprint from Verification Info. Paste the exact AppVerifier output (package ID and SHA-256 fingerprint(s) on separate lines)." >&2
          exit 1
        fi
        packageName=$(printf '%s\n' "$parsed" | sed -n '1p')
        sig_lines=$(printf '%s\n' "$parsed" | tail -n +2)
        packageSignature=$(signatures_format_block "$sig_lines")

        validate_apk_url() {
          local url="$1"
          [[ -z "$url" ]] && return 1
          if [[ ! "$url" =~ ^https:// ]]; then
            echo "Ignoring Direct APK Link (not an https:// URL): $url" >&2
            return 1
          fi
          if [[ ! "$url" =~ \.apk([?#].*)?$ ]]; then
            echo "Ignoring Direct APK Link (not a direct .apk file; store pages and listings are not supported): $url" >&2
            return 1
          fi
          printf '%s\n' "$url"
        }

        validate_fdroid_repo_url() {
          local url="$1"
          [[ -z "$url" ]] && return 1
          if [[ ! "$url" =~ ^https:// ]]; then
            echo "Ignoring Custom F-Droid Repository (not an https:// URL): $url" >&2
            return 1
          fi
          if [[ "$url" =~ \.apk([?#].*)?$ ]]; then
            echo "Ignoring Custom F-Droid Repository (looks like a direct APK link; use Direct APK Link instead): $url" >&2
            return 1
          fi
          printf '%s\n' "$url"
        }

        apk_url=""
        custom_fdroid_repo_url=""
        if [[ -n "$ISSUE_BODY" ]]; then
          raw_apk_url=$(signatures_parse_issue_field "Direct download link|Direct APK Link" "$ISSUE_BODY" || true)
          apk_url=$(validate_apk_url "$raw_apk_url" || true)
          raw_custom_fdroid_repo_url=$(signatures_parse_issue_field "Custom F-Droid Repository" "$ISSUE_BODY" || true)
          custom_fdroid_repo_url=$(validate_fdroid_repo_url "$raw_custom_fdroid_repo_url" || true)
        fi

        echo "packageName=$packageName" >> "$GITHUB_OUTPUT"
        gha_write_multiline_output packageSignature "$packageSignature"
        echo "apkUrl=$apk_url" >> "$GITHUB_OUTPUT"
        echo "customFdroidRepoUrl=$custom_fdroid_repo_url" >> "$GITHUB_OUTPUT"

        if [[ -n "$ISSUE_BODY" && -n "$ISSUE_NUMBER" ]]; then
          submission_issue_ref=$(signatures_submission_issue_ref "$ISSUE_NUMBER" "$ISSUE_BODY")
          echo "submissionIssueRef=$submission_issue_ref" >> "$GITHUB_OUTPUT"
        else
          echo "submissionIssueRef=" >> "$GITHUB_OUTPUT"
        fi
