name: Create submission PR
description: Merge signatures into data.yml, push a verified commit on a branch, and open a pull request
inputs:
  packageName:
    description: Android application ID
    required: true
  packageSignature:
    description: Submitter-provided SHA-256 fingerprint(s); newline-separated when multiple
    required: true
  issueNumber:
    description: Submission issue number
    required: true
  prBodyFile:
    description: Path to the pull request body markdown file
    required: true
  coAuthorTrailer:
    description: Co-authored-by trailer(s) for the git commit (labeler and issue author when different)
    required: true
  commitSuffix:
    description: Optional suffix appended to the git commit message subject line
    required: false
    default: ""
  accrescentSignature:
    description: Fingerprint(s) from Accrescent (store-match mode only)
    required: false
    default: ""
  fdroidResultsDir:
    description: Directory of per-repo F-Droid result JSON files from the matrix job
    required: false
    default: ""
  gplaySignature:
    description: Fingerprint(s) from Google Play (store-match mode only)
    required: false
    default: ""
  appverifierSignature:
    description: Fingerprint(s) from the matched AppVerifier signing configuration
    required: false
    default: ""
  directApkSignature:
    description: Fingerprint(s) from direct APK download (store-match mode only)
    required: false
    default: ""
  directApkLink:
    description: Link to the direct APK that was downloaded (when applicable)
    required: false
    default: ""
  directApkSha256:
    description: SHA-256 of the direct APK file bytes (when applicable)
    required: false
    default: ""
  customFdroidRepoUrl:
    description: Link to the custom F-Droid repository URL (when applicable)
    required: false
    default: ""
  customFdroidApkSha256:
    description: SHA-256 of the APK from the custom F-Droid repository (when applicable)
    required: false
    default: ""
  accrescentApkSha256:
    description: SHA-256 of the Accrescent APK (when applicable)
    required: false
    default: ""
  gplayApkSha256:
    description: SHA-256 of the Google Play APK (when applicable)
    required: false
    default: ""
  apkpureSignature:
    description: Fingerprint(s) from APKPure (store-match mode only)
    required: false
    default: ""
  apkpureApkSha256:
    description: SHA-256 of the APKPure APK (when applicable)
    required: false
    default: ""
  submitterSource:
    description: When set, add the submitter fingerprint under this source and skip store matching
    required: false
    default: ""
outputs:
  prCreated:
    description: Whether a pull request was opened
    value: ${{ steps.create.outputs.prCreated }}
  prUrl:
    description: URL of the created pull request
    value: ${{ steps.create.outputs.prUrl }}
  skipped:
    description: Whether PR creation was skipped (no matching store signatures)
    value: ${{ steps.prepare.outputs.skipped }}

runs:
  using: composite
  steps:
    - shell: bash
      id: prepare
      env:
        PACKAGE: ${{ inputs.packageName }}
        USER_SIG: ${{ inputs.packageSignature }}
        ISSUE: ${{ inputs.issueNumber }}
        CO_AUTHOR_TRAILER: ${{ inputs.coAuthorTrailer }}
        COMMIT_SUFFIX: ${{ inputs.commitSuffix }}
        ACC_SIG: ${{ inputs.accrescentSignature }}
        FDROID_RESULTS_DIR: ${{ inputs.fdroidResultsDir }}
        GPLAY_SIG: ${{ inputs.gplaySignature }}
        APPVERIFIER_SIG: ${{ inputs.appverifierSignature }}
        DIRECT_SIG: ${{ inputs.directApkSignature }}
        DIRECT_APK_URL: ${{ inputs.directApkLink }}
        DIRECT_APK_SHA256: ${{ inputs.directApkSha256 }}
        CUSTOM_FDROID_REPO_URL: ${{ inputs.customFdroidRepoUrl }}
        CUSTOM_FDROID_APK_SHA256: ${{ inputs.customFdroidApkSha256 }}
        ACC_APK_SHA256: ${{ inputs.accrescentApkSha256 }}
        GPLAY_APK_SHA256: ${{ inputs.gplayApkSha256 }}
        APKPURE_SIG: ${{ inputs.apkpureSignature }}
        APKPURE_APK_SHA256: ${{ inputs.apkpureApkSha256 }}
        SUBMITTER_SOURCE: ${{ inputs.submitterSource }}
      run: |
        set -euo pipefail
        source "${GITHUB_ACTION_PATH}/../signature-lib/signatures.lib.sh"

        echo "skipped=false" >> "$GITHUB_OUTPUT"
        echo "branch=new/${ISSUE}" >> "$GITHUB_OUTPUT"

        entry="$(mktemp)"
        if ! submission_build_entry_file "$entry"; then
          echo "No store matched the user-provided signature(s); skipping PR." >&2
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          rm -f "$entry"
          exit 0
        fi

        submission_merge_entry_into_data_yml "$entry"
        rm -f "$entry"

        branch="new/${ISSUE}"
        git checkout -b "$branch"

        msg_file="${GITHUB_WORKSPACE}/submission-commit-msg"
        {
          printf 'Add %s from #%s%s\n\n' "$PACKAGE" "$ISSUE" "$COMMIT_SUFFIX"
          printf 'Closes #%s\n' "$ISSUE"
          if [[ -n "$CO_AUTHOR_TRAILER" ]]; then
            printf '\n%s\n' "$CO_AUTHOR_TRAILER"
          fi
        } > "$msg_file"

        git add data.yml

    - name: Ensure remote branch exists
      if: steps.prepare.outputs.skipped != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        BRANCH: ${{ steps.prepare.outputs.branch }}
      run: |
        set -euo pipefail

        # `verified-bot-commit` updates an existing remote ref; create it if missing.
        if ! gh api "repos/${GH_REPO}/git/ref/heads/${BRANCH}" >/dev/null 2>&1; then
          base_sha=$(gh api "repos/${GH_REPO}/git/ref/heads/main" --jq '.object.sha')
          gh api -X POST "repos/${GH_REPO}/git/refs" \
            -f "ref=refs/heads/${BRANCH}" \
            -f "sha=${base_sha}" \
            >/dev/null
        fi

    - name: Push verified commit to branch
      if: steps.prepare.outputs.skipped != 'true'
      id: verified-commit
      uses: iarekylew00t/verified-bot-commit@v2
      with:
        ref: ${{ steps.prepare.outputs.branch }}
        message-file: submission-commit-msg
        files: |
          data.yml
        auto-stage: false

    - shell: bash
      id: create
      if: steps.prepare.outputs.skipped != 'true'
      env:
        PACKAGE: ${{ inputs.packageName }}
        ISSUE: ${{ inputs.issueNumber }}
        PR_BODY_FILE: ${{ inputs.prBodyFile }}
        BRANCH: ${{ steps.prepare.outputs.branch }}
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        echo "prCreated=false" >> "$GITHUB_OUTPUT"
        echo "prUrl=" >> "$GITHUB_OUTPUT"

        if [[ ! -f "$PR_BODY_FILE" ]]; then
          echo "PR body file not found: $PR_BODY_FILE" >&2
          exit 1
        fi

        pr_url=$(gh pr create \
          --repo "$GH_REPO" \
          --title "Add ${PACKAGE}" \
          --body-file "$PR_BODY_FILE" \
          --head "$BRANCH")

        echo "prCreated=true" >> "$GITHUB_OUTPUT"
        echo "prUrl=$pr_url" >> "$GITHUB_OUTPUT"
